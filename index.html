<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Yesa League</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-nav: #142d3b; --verde: #27ae60; --blanco: #ffffff; --rojo: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--azul-oscuro); color: #333; padding-bottom: 80px; overflow-x: hidden; }
        header { background: var(--azul-nav); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        #content { padding: 10px; width: 100%; }
        .seccion-titulo { color: white; font-size: 1.1em; margin: 10px 0; display: block; border-left: 4px solid var(--verde); padding-left: 10px; text-transform: uppercase; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); width: 100%; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td, th { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f8f9fa; color: #777; font-size: 0.7em; }
        .col-nombre { width: 45%; }
        .col-dato { width: 15%; text-align: center; }
        .col-estado { width: 25%; text-align: right; padding-right: 10px; }
        .amarilla-box { background: #f1c40f; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status-sancion { color: var(--rojo); font-weight: bold; font-size: 0.75em; }
        .status-ok { color: var(--verde); font-weight: bold; font-size: 0.75em; }
        .pts-bold { font-weight: bold; color: var(--verde); }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--azul-nav); display: flex; padding: 10px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.4); z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.65em; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--verde); }
        .nav-item span { font-size: 1.5em; margin-bottom: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>🏆 LA YESA LEAGUE</header>

    <main id="content">
        <div id="partidos">
            <span class="seccion-titulo">Resultados y Calendario</span>
            <div id="partidos-container"></div>
        </div>

        <div id="grupos" class="hidden">
            <span class="seccion-titulo">Clasificación</span>
            <div id="grupos-container"></div>
        </div>

        <div id="gol" class="hidden">
            <span class="seccion-titulo">Goleadores</span>
            <div class="card">
                <table>
                    <thead><tr><th class="col-nombre">Jugador</th><th>Equipo</th><th class="col-dato">PJ</th><th class="col-dato">G</th></tr></thead>
                    <tbody id="body-gol"></tbody>
                </table>
            </div>
        </div>

        <div id="tar" class="hidden">
            <span class="seccion-titulo">Sanciones</span>
            <div class="card">
                <table>
                    <thead><tr><th class="col-nombre">Jugador</th><th class="col-dato">🟨</th><th class="col-dato">PJ</th><th class="col-estado">Estado</th></tr></thead>
                    <tbody id="body-tar"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-item active" id="btn-partidos" onclick="ver('partidos')"><span>⚽</span>PARTIDOS</div>
        <div class="nav-item" id="btn-grupos" onclick="ver('grupos')"><span>📊</span>TABLAS</div>
        <div class="nav-item" id="btn-gol" onclick="ver('gol')"><span>👟</span>GOLES</div>
        <div class="nav-item" id="btn-tar" onclick="ver('tar')"><span>🟨</span>SANCIONES</div>
    </nav>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                const equipoPJ = {}; // Solo partidos con resultado
                const tienePendiente = {}; // Equipos con partidos sin resultado puesto

                resP.forEach(p => {
                    if (!p.Local) return;
                    // Lógica Crítica: Solo suma si hay algo escrito en Goles Local
                    const haJugado = (p.GolesL !== "" && p.GolesL !== undefined && p.GolesL !== null);
                    
                    if (haJugado) {
                        equipoPJ[p.Local] = (equipoPJ[p.Local] || 0) + 1;
                        equipoPJ[p.Visitante] = (equipoPJ[p.Visitante] || 0) + 1;
                    } else {
                        // Es un partido futuro/calendario
                        tienePendiente[p.Local] = true;
                        tienePendiente[p.Visitante] = true;
                    }
                });

                renderPartidos(resP);
                renderClasificacion(resC, equipoPJ);
                renderGoleadores(resG, equipoPJ);
                renderTarjetas(resT, equipoPJ, tienePendiente);

            } catch (e) { console.error("Error cargando:", e); }
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:12px; display:flex; align-items:center; justify-content:space-between; font-size:0.85em;">
                    <div style="width:38%; text-align:right; font-weight:bold;">${m.Local}</div>
                    <div style="background:var(--azul-oscuro); color:white; padding:4px 8px; border-radius:6px; font-weight:bold; min-width:45px; text-align:center;">
                        ${m.GolesL !== "" ? m.GolesL : '-'} : ${m.GolesV !== "" ? m.GolesV : '-'}
                    </div>
                    <div style="width:38%; text-align:left; font-weight:bold;">${m.Visitante}</div>
                </div>`).join('');
        }

        function renderClasificacion(data, stats) {
            const container = document.getElementById('grupos-container');
            const grupos = {};
            data.filter(e => e.Nombre).forEach(e => {
                if (!grupos[e.Grupo]) grupos[e.Grupo] = [];
                grupos[e.Grupo].push(e);
            });

            container.innerHTML = Object.keys(grupos).map(g => {
                const ordenados = grupos[g].sort((a, b) => (parseInt(b.Puntos) || 0) - (parseInt(a.Puntos) || 0));
                return `
                <div class="card">
                    <div style="padding:8px 12px; background:#f1f1f1; font-weight:bold; font-size:0.75em;">GRUPO ${g}</div>
                    <table>
                        <thead><tr><th class="col-nombre">Equipo</th><th class="col-dato">PJ</th><th class="col-dato">PTS</th></tr></thead>
                        <tbody>${ordenados.map(e => `<tr><td>${e.Nombre}</td><td class="col-dato">${stats[e.Nombre] || 0}</td><td class="col-dato pts-bold">${e.Puntos || 0}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }).join('');
        }

        function renderGoleadores(data, stats) {
            const ordenados = data.filter(j => j.Nombre).sort((a, b) => (parseInt(b.Goles) || 0) - (parseInt(a.Goles) || 0));
            document.getElementById("body-gol").innerHTML = ordenados.map(j => `
                <tr>
                    <td class="col-nombre"><b>${j.Nombre}</b></td>
                    <td style="font-size:0.8em; color:#666;">${j.Equipo}</td>
                    <td class="col-dato">${stats[j.Equipo] || 0}</td>
                    <td class="col-dato" style="color:var(--verde); font-weight:bold;">${j.Goles || 0}</td>
                </tr>`).join('');
        }

        function renderTarjetas(data, stats, pend) {
            const ordenados = data.filter(j => j.Nombre).sort((a, b) => (parseInt(b.Amarillas) || 0) - (parseInt(a.Amarillas) || 0));
            document.getElementById("body-tar").innerHTML = ordenados.map(j => {
                const am = parseInt(j.Amarillas) || 0;
                const pjEq = stats[j.Equipo] || 0;
                const esSancionCiclo = (am > 0 && am % 3 === 0);
                const tienePartidoHoy = pend[j.Equipo] || false;

                let estado = `<span class="status-ok">✅ OK</span>`;
                let pjFinal = pjEq - Math.floor(am / 3);

                if (esSancionCiclo && tienePartidoHoy) {
                    estado = `<span class="status-sancion">⚠️ SANCION</span>`;
                    pjFinal = pjEq; // No restamos el partido aún porque no lo ha "perdido" (el equipo no ha jugado el partido de castigo)
                }

                return `<tr>
                    <td class="col-nombre"><b>${j.Nombre}</b><br><small style="color:#999">${j.Equipo}</small></td>
                    <td class="col-dato"><span class="amarilla-box">${am}</span></td>
                    <td class="col-dato">${pjFinal < 0 ? 0 : pjFinal}</td>
                    <td class="col-estado">${estado}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
            window.scrollTo(0,0);
        }

        cargarTodo();
    </script>
</body>
</html>

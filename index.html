<script>
    const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

    async function cargarTodo() {
        try {
            const [resP, resC, resG, resT] = await Promise.all([
                fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
            ]);

            // Procesar lógica automática
            const estadisticasEquipos = calcularEstadisticas(resP);
            
            renderPartidos(resP);
            renderClasificacion(resC, estadisticasEquipos);
            renderGoleadores(resG, estadisticasEquipos);
            renderTarjetas(resT, estadisticasEquipos);
        } catch (e) { console.error("Error:", e); }
    }

    function calcularEstadisticas(partidos) {
        const stats = {};
        partidos.forEach(p => {
            const local = p.Local;
            const visit = p.Visitante;
            const gL = parseInt(p.GolesL);
            const gV = parseInt(p.GolesV);

            if (!stats[local]) stats[local] = { pts: 0, pj: 0, dg: 0 };
            if (!stats[visit]) stats[visit] = { pts: 0, pj: 0, dg: 0 };

            // Solo contar si hay resultado puesto (GolesL no está vacío)
            if (p.GolesL !== "" && p.GolesL !== undefined) {
                stats[local].pj++;
                stats[visit].pj++;
                stats[local].dg += (gL - gV);
                stats[visit].dg += (gV - gL);

                if (gL > gV) stats[local].pts += 3;
                else if (gL < gV) stats[visit].pts += 3;
                else { stats[local].pts += 1; stats[visit].pts += 1; }
            }
        });
        return stats;
    }

    function renderClasificacion(data, stats) {
        const container = document.getElementById('grupos-container');
        const grupos = {};

        // Unir datos del Excel con cálculos automáticos
        const dataProcesada = data.map(e => ({
            ...e,
            Puntos: stats[e.Nombre]?.pts || 0,
            PJ: stats[e.Nombre]?.pj || 0,
            Diferencia: stats[e.Nombre]?.dg || 0
        }));

        // Ordenar por puntos
        dataProcesada.sort((a, b) => b.Puntos - a.Puntos);

        dataProcesada.forEach(item => {
            if (!grupos[item.Grupo]) grupos[item.Grupo] = [];
            grupos[item.Grupo].push(item);
        });

        container.innerHTML = Object.keys(grupos).map(gId => `
            <div class="card" style="padding:15px;">
                <h3 style="margin:0 0 10px 0; color:var(--azul-oscuro);">Grupo ${gId}</h3>
                <table>
                    <thead><tr><th>Equipo</th><th>PJ</th><th>DG</th><th>PTS</th></tr></thead>
                    <tbody>${grupos[gId].map(e => `
                        <tr><td>${e.Nombre}</td><td>${e.PJ}</td><td>${e.Diferencia}</td><td class="pts">${e.Puntos}</td></tr>
                    `).join('')}</tbody>
                </table>
            </div>
        `).join('');
    }

    function renderGoleadores(data, stats) {
        // Sumar partidos jugados del equipo al jugador
        const dataOrdenada = data.map(j => ({
            ...j,
            PJ: stats[j.Equipo]?.pj || 0
        })).sort((a, b) => (parseInt(b.Goles) || 0) - (parseInt(a.Goles) || 0));
        
        document.querySelector("#tabla-gol tbody").innerHTML = dataOrdenada.map(j => `
            <tr><td><b>${j.Nombre}</b></td><td>${j.Equipo}</td><td>${j.PJ} PJ</td><td class="pts">${j.Goles || 0}</td></tr>
        `).join('');
    }

    function renderTarjetas(data, stats) {
        const dataOrdenada = data.map(j => ({
            ...j,
            PJ: stats[j.Equipo]?.pj || 0
        })).sort((a, b) => (parseInt(b.Amarillas) || 0) - (parseInt(a.Amarillas) || 0));

        document.getElementById("body-tar").innerHTML = dataOrdenada.map(j => {
            const am = parseInt(j.Amarillas) || 0;
            const sancionado = am > 0 && am % 3 === 0;
            return `<tr>
                <td><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                <td><span style="background:#f1c40f; padding:2px 6px; border-radius:4px; font-weight:bold;">${am}</span></td>
                <td>${j.PJ}</td>
                <td>${sancionado ? '<b style="color:#e74c3c">⚠️ SANCIONADO</b>' : '<b style="color:#2ecc71">✅ OK</b>'}</td>
            </tr>`;
        }).join('');
    }

    // ... (Mantén las funciones renderPartidos y ver igual que antes)
</script>

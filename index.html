<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --azul-oscuro: #0f172a; 
            --azul-nav: #1e293b; 
            --verde-principal: #10b981; 
            --blanco: #ffffff; 
            --rojo-sancion: #ef4444; 
            --texto-claro: #f1f5f9;
            --texto-gris: #94a3b8;
            --fondo-gris: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--azul-oscuro); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* MENÚ LATERAL (SIDEBAR) */
        #sidebar { 
            width: 200px; 
            background: var(--azul-nav); 
            color: var(--blanco); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 1001;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .nav-header { 
            padding: 25px 20px; 
            font-family: 'Outfit', sans-serif;
            font-weight: 700; 
            font-size: 1.1em; 
            color: var(--verde-principal); 
            letter-spacing: -0.5px; 
            text-transform: uppercase;
        }
        .btn { 
            padding: 16px 20px; 
            cursor: pointer; 
            color: var(--texto-gris); 
            font-size: 0.85em; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            text-decoration: none;
        }
        .btn i { width: 18px; text-align: center; }
        .btn:hover { background: rgba(255,255,255,0.03); color: var(--blanco); }
        .btn.active { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--verde-principal); 
            border-left: 3px solid var(--verde-principal);
        }

        /* CONTENEDOR PRINCIPAL */
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
            background: var(--fondo-gris);
        }
        
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            padding: 15px 25px; 
            background: var(--blanco); 
            border-bottom: 1px solid #e2e8f0;
            z-index: 10; 
        }
        .selector-torneo { 
            background: var(--blanco); 
            color: var(--azul-oscuro); 
            border: 1px solid #cbd5e1; 
            padding: 8px 12px; 
            font-size: 0.85em; 
            font-weight: 600; 
            border-radius: 6px; 
            outline: none; 
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
        }
        .seccion-titulo { 
            color: var(--azul-oscuro); 
            font-family: 'Outfit', sans-serif;
            font-size: 1.5em; 
            margin-bottom: 25px; 
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }
        .seccion-titulo::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* CLASIFICACIÓN Y TABLAS */
        .grid-grupos { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .card { 
            background: var(--blanco); 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e2e8f0;
            overflow: hidden; 
            width: 100%;
        }
        
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 0.9em; white-space: nowrap; }
        th { background: #f8fafc; color: #64748b; font-size: 0.75em; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700; }
        td b { color: var(--azul-oscuro); font-weight: 600; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #64748b; font-style: italic; }
        .pts-verde { color: var(--verde-principal); font-weight: 700; font-size: 1.05em; }
        .badge-amarilla { background: #fef08a; padding: 3px 7px; border-radius: 4px; font-weight: 700; color: #854d0e; font-size: 0.8em; }

        /* LISTA DE PARTIDOS */
        .match-row { padding: 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .match-team { flex: 1; font-weight: 700; color: var(--azul-oscuro); font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .match-score { 
            background: var(--azul-oscuro); 
            color: var(--blanco); 
            padding: 6px 14px; 
            border-radius: 6px; 
            min-width: 65px; 
            text-align: center; 
            font-weight: 700; 
            font-size: 1.1em;
            font-family: 'Outfit', sans-serif;
        }
        .match-score.hora { background: #f1f5f9; color: #64748b; font-size: 0.85em; border: 1px solid #e2e8f0; }

        /* BRACKETS DE ELIMINATORIAS */
        .bracket-wrapper { display: flex; gap: 30px; padding: 15px 0; overflow-x: auto; align-items: center; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 240px; gap: 15px; }
        .bracket-match { background: white; border-radius: 10px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .bracket-title { padding: 8px; font-size: 0.7em; text-align: center; font-weight: 800; color: #94a3b8; text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .bracket-team-row { display: flex; justify-content: space-between; padding: 10px 14px; align-items: center; }
        .bracket-name { font-weight: 600; color: #334155; font-size: 0.9em; }
        .bracket-goals { font-weight: 700; color: var(--azul-oscuro); background: #f1f5f9; padding: 3px 8px; border-radius: 4px; font-size: 0.9em; }
        .winner { background: rgba(16, 185, 129, 0.04); }
        .winner .bracket-name { color: var(--verde-principal); font-weight: 700; }
        .winner .bracket-goals { background: var(--verde-principal); color: white; }

        .hidden { display: none; }

        /* ADAPTACIÓN PARA MÓVILES */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .nav-header { display: none; }
            .btn { flex: 1; justify-content: center; padding: 14px 8px; border-left: none; border-bottom: 3px solid transparent; white-space: nowrap; font-size: 0.8em; }
            .btn.active { border-left: none; border-bottom: 3px solid var(--verde-principal); }
            .grid-grupos { grid-template-columns: 1fr; }
            #content { padding: 15px; }
            .seccion-titulo { font-size: 1.3em; }
            .bracket-column { min-width: 210px; }
            .match-row { padding: 15px; }
            .match-team { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="nav-header">LA YESA <span style="color:white">HUB</span></div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')"><i class="fa-solid fa-calendar-day"></i> PARTIDOS</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')"><i class="fa-solid fa-table-list"></i> GRUPOS</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')"><i class="fa-solid fa-trophy"></i> PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')"><i class="fa-solid fa-ranking-star"></i> GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')"><i class="fa-solid fa-copy"></i> SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Torneo Masculino</option>
                <option value="femenino">🙋‍♀️ Torneo Femenino</option>
                <option value="mixto">🤼‍♂️ Torneo Mixto</option>
                <option value="ninos">🧒 Torneo Niños</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos">
                <span class="seccion-titulo">Resultados y Horarios</span>
                <div id="partidos-container"></div>
            </div>

            <div id="grupos" class="hidden">
                <span class="seccion-titulo">Clasificación General</span>
                <div id="grupos-container" class="grid-grupos"></div>
            </div>
            
            <div id="elim" class="hidden">
                <span class="seccion-titulo">Cuadro de Honor</span>
                <div class="bracket-wrapper" id="bracket-container"></div>
            </div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Tabla de Goleadores</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugadora / Jugador</th><th>Club / Equipo</th><th class="txt-centro">Goles</th></tr>
                        </thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="tar" class="hidden">
                <span class="seccion-titulo">Control de Sanciones</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugadora / Jugador</th><th>Club / Equipo</th><th class="txt-centro">🟨 Amarillas</th><th class="txt-derecha">Estado</th></tr>
                        </thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '1KyHfl8Ajou5HlKaWOwopSjQN-NKE7SVPeYQhFmcvVbU', 
            mixto: '1rdrR11IM8bzdAoMUQMkBkzXc_xU4vPt8zeVUo_BCgqY',
            ninos: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'      
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function extraerValorCelda(celda) {
            if (!celda) return '';
            if (celda.v !== null && celda.v !== undefined && typeof celda.v === 'string' && celda.v.includes('Date(')) {
                const partes = celda.v.match(/\d+/g);
                if (partes && partes.length >= 5) {
                    return `${partes[3].padStart(2, '0')}:${partes[4].padStart(2, '0')}`;
                }
            }
            if (celda.f !== null && celda.f !== undefined) return celda.f.trim();
            if (celda.v !== null && celda.v !== undefined) return celda.v.toString().trim();
            return '';
        }

        async function consultarGoogleSheet(nombrePestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombrePestaña)}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson));
                
                if (!jsonNeto || !jsonNeto.table || !jsonNeto.table.rows) return { headers: {}, rows: [] };

                const headers = {};
                const rowsRaw = jsonNeto.table.rows;
                if (jsonNeto.table.cols) {
                    jsonNeto.table.cols.forEach((col, idx) => {
                        if (col && col.label) headers[normalizarTexto(col.label)] = idx;
                    });
                }
                if (Object.keys(headers).length === 0 && rowsRaw.length > 0) {
                    rowsRaw[0].c.forEach((celda, idx) => {
                        const val = normalizarTexto(extraerValorCelda(celda));
                        if (val) headers[val] = idx;
                    });
                }
                const rowsProcesadas = rowsRaw.map(r => r && r.c ? r.c.map(celda => extraerValorCelda(celda)) : []);
                return { headers, rows: rowsProcesadas };
            } catch (error) {
                console.error("Error cargando pestaña: " + nombrePestaña, error);
                return null;
            }
        }

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT, resE] = await Promise.all([
                    consultarGoogleSheet('Partidos'),
                    consultarGoogleSheet('Clasificacion'),
                    consultarGoogleSheet('Goleadores'),
                    consultarGoogleSheet('Tarjetas'),
                    consultarGoogleSheet('Eliminatorias')
                ]);

                if (!resP || !resC || resP.rows.length === 0) {
                    document.getElementById('partidos-container').innerHTML = `
                        <div style="color:#e74c3c; text-align:center; padding:30px; font-weight:bold;">
                            ⚠️ Error de sincronización con la hoja del torneo.<br>
                            Verifica que hayas activado 'Publicar en la web' en este documento de Google Sheets.
                        </div>`;
                    return;
                }

                let idxHora = 0;
                let idxLocal = 1;
                let idxGolesL = 2;
                let idxGolesV = 3;
                let idxVisitante = 4;

                renderPartidos(resP.rows, idxLocal, idxVisitante, idxGolesL, idxGolesV, idxHora);
                
                if (resC) renderClasificacion(resC);
                if (resG) renderGoleadores(resG);
                if (resT) renderTarjetas(resT);
                if (resE) renderBracket(resE);
            } catch (e) { console.error(e); }
        }

        function renderPartidos(rows, idxLocal, idxVisitante, idxGolesL, idxGolesV, idxHora) {
            const container = document.getElementById('partidos-container');
            if (!container) return;
            
            const filtrados = rows.filter((fila, idx) => {
                if (idx === 0 || !fila || fila.length < 2) return false;
                const txt = normalizarTexto(fila[idxLocal]);
                return txt !== '' && txt !== 'local' && txt !== 'equipolocal';
            });
            
            if (filtrados.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:30px;color:#64748b;">No hay partidos cargados todavía.</div>`;
                return;
            }

            container.innerHTML = filtrados.map(fila => {
                const local = fila[idxLocal] || '';
                const visitante = fila[idxVisitante] || '';
                const gL = parseInt(fila[idxGolesL]);
                const gV = parseInt(fila[idxGolesV]);
                const hora = fila[idxHora] || '';

                const marcador = (!isNaN(gL) && !isNaN(gV)) ? `<div class="match-score">${gL}:${gV}</div>` : `<div class="match-score hora">${hora || '-:-'}</div>`;
                
                return `<div class="card"><div class="match-row">
                    <div class="match-team" style="text-align:right;">${local}</div>
                    ${marcador}
                    <div class="match-team">${visitante}</div>
                </div></div>`;
            }).join('');
        }

        function renderClasificacion(res) {
            const container = document.getElementById('grupos-container');
            if (!container) return;

            const equipos = res.rows.filter((fila, idx) => {
                if (idx === 0 || !fila || fila.length < 2) return false;
                const txt = normalizarTexto(fila[0]);
                return txt !== 'equipo' && txt !== 'nombre' && fila[0] !== '';
            });

            if (equipos.length === 0) {
                container.innerHTML = `<div style="color:#64748b;padding:20px;grid-column:1/-1;text-align:center;">Clasificación no disponible.</div>`;
                return;
            }

            const grupos = {};
            equipos.forEach(fila => {
                const nombre = fila[0];
                const grupo = fila[1] || 'Único';
                const dif = fila[2] || '0';
                const pts = parseInt(fila[3]) || 0;
                
                if (!grupos[grupo]) grupos[grupo] = [];
                grupos[grupo].push({ nombre: nombre, pts: pts, dif: dif });
            });

            container.innerHTML = Object.keys(grupos).map(g => {
                const orden = grupos[g].sort((a, b) => b.pts - a.pts);
                return `<div class="card"><div style="padding:12px 18px; background:#f8fafc; font-weight:700; font-size:0.8em; color: #64748b; border-bottom: 1px solid #e2e8f0;">GRUPO ${g}</div>
                    <table><thead><tr><th>EQUIPO</th><th class="txt-centro">DG</th><th class="txt-centro">PTS</th></tr></thead>
                    <tbody>${orden.map(e => `<tr><td><b>${e.nombre}</b></td><td class="txt-centro" style="color:#64748b">${e.dif}</td><td class="txt-centro pts-verde">${e.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }

        function renderGoleadores(res) {
            const container = document.getElementById("body-gol");
            if (!container) return;

            const jugadores = res.rows.filter((fila, idx) => {
                if (idx === 0 || !fila || fila.length < 2) return false;
                const txt = normalizarTexto(fila[0]);
                return txt !== 'jugador' && txt !== 'jugadora' && txt !== 'nombre' && txt !== '';
            });

            if (jugadores.length === 0) {
                container.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#64748b;padding:25px;">No se registran goles en este torneo.</td></tr>`;
                return;
            }

            const ordened = jugadores.sort((a, b) => (parseInt(b[2]) || 0) - (parseInt(a[2]) || 0));
            container.innerHTML = ordened.map(fila => `<tr><td><b>${fila[0]}</b></td><td class="txt-club">${fila[1] || '-'}</td><td class="txt-centro pts-verde">${fila[2] || 0}</td></tr>`).join('');
        }

        function renderTarjetas(res) {
            const container = document.getElementById("body-tar");
            if (!container) return;

            const tarjetas = res.rows.filter((fila, idx) => {
                if (idx === 0 || !fila || fila.length < 2) return false;
                const txt = normalizarTexto(fila[0]);
                return txt !== 'jugador' && txt !== 'jugadora' && txt !== 'nombre' && txt !== '';
            });

            if (tarjetas.length === 0) {
                container.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#64748b;padding:25px;">Sin amonestaciones registradas.</td></tr>`;
                return;
            }

            container.innerHTML = tarjetas.map(fila => {
                const nombre = fila[0], club = fila[1] || '', amarillas = fila[2] || '0', sancion = fila[3] || '';
                let estaSancionado = false;
                
                if (sancion.toLowerCase() === 'sancionado' || sancion.toLowerCase() === 'sancionada' || sancion.trim() === '1' || sancion.toLowerCase() === 'si') {
                    estaSancionado = true;
                }

                return `<tr>
                    <td><b>${nombre}</b></td>
                    <td class="txt-club">${club || '-'}</td>
                    <td class="txt-centro"><span class="badge-amarilla">${amarillas}</span></td>
                    <td class="txt-derecha" style="font-weight:700; color:${estaSancionado ? 'var(--rojo-sancion)' : 'var(--verde-principal)'}">${estaSancionado ? 'SANCIONADO' : 'HABILITADO'}</td>
                </tr>`;
            }).join('');
        }

        function cardBracket(fila, titulo) {
            if (!fila) return `
                <div class="bracket-match">
                    <div class="bracket-title">${titulo}</div>
                    <div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals">-</span></div>
                    <div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals">-</span></div>
                </div>`;
            
            const local = fila[1], visitante = fila[4];
            const gL = parseInt(fila[2]), gV = parseInt(fila[3]);
            
            const ganoL = !isNaN(gL) && !isNaN(gV) && gL > gV;
            const ganoV = !isNaN(gL) && !isNaN(gV) && gV > gL;

            return `
                <div class="bracket-match">
                    <div class="bracket-title">${titulo}</div>
                    <div class="bracket-team-row ${ganoL ? 'winner' : ''}">
                        <span class="bracket-name">${local || '—'}</span>
                        <span class="bracket-goals">${isNaN(gL) ? '-' : gL}</span>
                    </div>
                    <div class="bracket-team-row ${ganoV ? 'winner' : ''}">
                        <span class="bracket-name">${visitante || '—'}</span>
                        <span class="bracket-goals">${isNaN(gV) ? '-' : gV}</span>
                    </div>
                </div>`;
        }

        function renderBracket(res) {
            const container = document.getElementById('bracket-container');
            if (!container) return;

            const fases = res.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && normalizarTexto(fila[0]) !== 'fase');
            if (fases.length === 0) {
                container.innerHTML = `<div style="color:#64748b;text-align:center;padding:20px;width:100%;">No hay eliminatorias cargadas.</div>`;
                return;
            }

            const buscar = (nombre) => fases.find(f => normalizarTexto(f[0]) === normalizarTexto(nombre));

            container.innerHTML = `
                <div class="bracket-column">
                    ${cardBracket(buscar('Cuartos 1'), 'Cuartos 1')}
                    ${cardBracket(buscar('Cuartos 2'), 'Cuartos 2')}
                    ${cardBracket(buscar('Cuartos 3'), 'Cuartos 3')}
                    ${cardBracket(buscar('Cuartos 4'), 'Cuartos 4')}
                </div>
                <div class="bracket-column">
                    ${cardBracket(buscar('Semifinal 1'), 'Semifinal 1')}
                    ${cardBracket(buscar('Semifinal 2'), 'Semifinal 2')}
                </div>
                <div class="bracket-column" style="justify-content: center;">
                    ${cardBracket(buscar('Final'), '🏆 GRAN FINAL')}
                </div>
            `;
        }

        function ver(s) {
            ['partidos', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }
        
        cargarTodo();
    </script>
</body>

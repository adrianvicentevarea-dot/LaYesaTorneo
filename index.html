<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa</title>
    <style>
        :root { 
            --azul-oscuro: #1b3a4b; 
            --azul-nav: #142d3b; 
            --verde: #27ae60; 
            --blanco: #ffffff; 
            --rojo: #e74c3c; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--azul-oscuro); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* MENU LATERAL */
        #sidebar { 
            width: 180px; 
            background: var(--azul-nav); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 1001; 
        }
        .nav-header { 
            padding: 20px 15px; 
            font-weight: bold; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            font-size: 1em; 
            color: var(--verde); 
            letter-spacing: 0.5px; 
        }
        .btn { 
            padding: 15px 20px; 
            cursor: pointer; 
            color: #bdc3c7; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.85em; 
            font-weight: bold; 
            text-decoration: none;
        }
        .btn.active { background: var(--verde); color: white; }

        /* CONTENEDOR PRINCIPAL DERECHO */
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* BARRA SUPERIOR PARA EL DESPLEGABLE */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            padding: 15px 20px; 
            background: rgba(0, 0, 0, 0.1); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10; 
        }
        .selector-torneo { 
            background: var(--azul-nav); 
            color: white; 
            border: 2px solid var(--verde); 
            padding: 8px 15px; 
            font-size: 0.9em; 
            font-weight: bold; 
            border-radius: 6px; 
            outline: none; 
            cursor: pointer; 
        }
        .selector-torneo option { background: var(--azul-nav); color: white; }

        /* CONTENIDO SCROLLABLE */
        #content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }
        .seccion-titulo { 
            color: white; 
            font-size: 1.2em; 
            margin-bottom: 25px; 
            display: block; 
            border-left: 4px solid var(--verde); 
            padding-left: 10px; 
            text-transform: uppercase; 
            font-weight: bold; 
        }

        /* TARJETAS Y CONTENEDORES */
        .grid-grupos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--blanco); border-radius: 6px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 100%; overflow: hidden; }
        
        /* TABLAS */
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 1em; white-space: nowrap; }
        th { background: #f9f9f9; color: #7f8c8d; font-size: 0.75em; letter-spacing: 0.5px; text-transform: uppercase; font-weight: bold; }
        td b { font-size: 1.05em; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #777; font-style: italic; }
        .pts-verde { color: var(--verde); font-weight: bold; font-size: 1.1em; }
        .badge-amarilla { background: #f1c40f; padding: 3px 8px; border-radius: 3px; font-weight: bold; color: #000; font-size: 0.95em; }

        /* PARTIDOS GENERALES */
        .match-row { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.1em; }
        .match-team { width: 42%; font-weight: bold; color: #333; }
        .match-score { background: var(--azul-nav); color: white; padding: 5px 12px; border-radius: 4px; min-width: 60px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .match-score.hora { background: #7f8c8d; font-size: 0.95em; }

        /* PLAYOFFS */
        .bracket-wrapper { display: flex; gap: 30px; padding: 10px 5px; overflow-x: auto; align-items: center; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; height: 550px; min-width: 220px; flex: 1; }
        .bracket-column.final-col { justify-content: center; min-width: 240px; }
        
        .bracket-match { background: white; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; font-size: 0.95em; width: 100%; margin-bottom: 10px; }
        .bracket-title { background: #f4f6f7; font-size: 0.8em; font-weight: bold; text-align: center; color: #666; border-bottom: 1px solid #ddd; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bracket-team-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; }
        .bracket-team-row:last-child { border-bottom: none; }
        .bracket-name { font-weight: bold; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .bracket-goals { background: var(--azul-nav); color: white; font-weight: bold; padding: 4px 10px; border-radius: 3px; min-width: 30px; text-align: center; font-size: 1em; }
        .bracket-goals.empty { background: #e0e0e0; color: #999; }
        
        .winner { background: #ebf5fb; }
        .winner .bracket-name { color: #2980b9; }
        .winner .bracket-goals { background: var(--verde); }

        .hidden { display: none; }

        /* RESPONSIVE PARA MÓVILES */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
            .nav-header { display: none; }
            .btn { flex: 1; text-align: center; padding: 15px 10px; white-space: nowrap; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.05); }
            .grid-grupos { grid-template-columns: 1fr; }
            .top-bar { justify-content: center; padding: 10px; }
            .bracket-column { height: auto; gap: 15px; }
            .bracket-wrapper { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="nav-header">TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ PARTIDOS</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 GRUPOS</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')">🏆 PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Fútbol Masculino</option>
                <option value="femenino">🙋‍♀️ Fútbol Femenino</option>
                <option value="ninos">🧒 Fútbol Pequeños</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos"><span class="seccion-titulo">Resultados y Horarios</span><div id="partidos-container"></div></div>
            <div id="grupos" class="hidden"><span class="seccion-titulo">Clasificación</span><div id="grupos-container" class="grid-grupos"></div></div>
            
            <div id="elim" class="hidden">
                <span class="seccion-titulo">Fase Final</span>
                <div class="bracket-wrapper" id="bracket-container"></div>
            </div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Goleadores</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Club</th>
                                <th class="txt-centro">PJ</th>
                                <th class="txt-centro">G</th>
                            </tr>
                        </thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="tar" class="hidden">
                <span class="seccion-titulo">Sanciones</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Club</th>
                                <th class="txt-centro">PJ</th>
                                <th class="txt-centro">🟨</th>
                                <th class="txt-derecha">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '19lxZHFj-NaSIAT6mjs_Oiqm6UEdKBat5hoHny_UFN1U', 
            ninos: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'      
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        // EXTRAE EL VALOR ELIMINANDO TEXTOS EXTRAÑOS DE FECHAS DE GOOGLE
        function extraerValorCelda(celda) {
            if (!celda) return '';
            if (celda.v !== null && celda.v !== undefined && typeof celda.v === 'string' && celda.v.includes('Date(')) {
                const partes = celda.v.match(/\d+/g);
                if (partes && partes.length >= 5) {
                    return `${partes[3].padStart(2, '0')}:${partes[4].padStart(2, '0')}`;
                }
            }
            if (celda.f !== null && celda.f !== undefined) return celda.f.trim();
            if (celda.v !== null && celda.v !== undefined) return celda.v.toString().trim();
            return '';
        }

        async function consultarGoogleSheet(nombrePestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombrePestaña)}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson));
                
                if (!jsonNeto || !jsonNeto.table || !jsonNeto.table.rows) return { headers: {}, rows: [] };

                // MAPEADO DINÁMICO DE COLUMNAS (Detecta la posición por nombre en la fila 1)
                const headers = {};
                if (jsonNeto.table.cols) {
                    jsonNeto.table.cols.forEach((col, idx) => {
                        if (col && col.label) {
                            headers[col.label.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "")] = idx;
                        }
                    });
                }

                // Si Google no devolvió etiquetas en las columnas, usamos la primera fila como cabecera alternativa
                const rowsRaw = jsonNeto.table.rows;
                if (Object.keys(headers).length === 0 && rowsRaw.length > 0) {
                    rowsRaw[0].c.forEach((celda, idx) => {
                        const val = extraerValorCelda(celda).toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (val) headers[val] = idx;
                    });
                }

                const rowsProcesadas = rowsRaw.map(r => {
                    if (!r || !r.c) return [];
                    return r.c.map(celda => extraerValorCelda(celda));
                });

                return { headers, rows: rowsProcesadas };
            } catch (error) {
                console.error("Error cargando la pestaña: " + nombrePestaña, error);
                return null;
            }
        }

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT, resE] = await Promise.all([
                    consultarGoogleSheet('Partidos'),
                    consultarGoogleSheet('Clasificacion'),
                    consultarGoogleSheet('Goleadores'),
                    consultarGoogleSheet('Tarjetas'),
                    consultarGoogleSheet('Eliminatorias')
                ]);

                if (!resP || !resC || !resP.rows || !resC.rows) {
                    document.getElementById('partidos-container').innerHTML = `
                        <div style="color:#e74c3c; text-align:center; padding:20px; font-weight:bold;">
                            ⚠️ Error de sincronización con Google Sheets.<br>
                            Verifica que las pestañas mantengan los nombres idénticos.
                        </div>`;
                    return;
                }

                // Buscar índices correspondientes para la pestaña PARTIDOS
                const hP = resP.headers;
                const idxLocal = hP['local'] !== undefined ? hP['local'] : 0;
                const idxVisitante = hP['visitante'] !== undefined ? hP['visitante'] : 1;
                const idxGolesL = hP['golesl'] !== undefined ? hP['golesl'] : 2;
                const idxGolesV = hP['golesv'] !== undefined ? hP['golesv'] : 3;
                const idxHora = hP['hora'] !== undefined ? hP['hora'] : (hP['horario'] !== undefined ? hP['horario'] : 4);

                // Calcular estadísticas automáticas basándose en los índices mapeados
                const stats = {}; 
                resP.rows.forEach((fila, i) => {
                    if (i === 0 || !fila[idxLocal] || fila[idxLocal].toLowerCase() === 'local') return; 
                    const local = fila[idxLocal], visitante = fila[idxVisitante];
                    const golesL = fila[idxGolesL], golesV = fila[idxGolesV];
                    
                    if (!stats[local]) stats[local] = { pj: 0, pts: 0 };
                    if (!stats[visitante]) stats[visitante] = { pj: 0, pts: 0 };
                    
                    const gL = parseInt(golesL);
                    const gV = parseInt(golesV);
                    
                    if (!isNaN(gL) && !isNaN(gV)) {
                        stats[local].pj++; stats[visitante].pj++;
                        if (gL > gV) stats[local].pts += 3;
                        else if (gV > gL) stats[visitante].pts += 3;
                        else { stats[local].pts += 1; stats[visitante].pts += 1; }
                    }
                });

                renderPartidos(resP.rows, idxLocal, idxVisitante, idxGolesL, idxGolesV, idxHora);
                renderClasificacion(resC, stats);
                renderGoleadores(resG, stats);
                renderTarjetas(resT, stats);
                renderBracket(resE);
            } catch (e) { console.error(e); }
        }

        function renderPartidos(rows, idxLocal, idxVisitante, idxGolesL, idxGolesV, idxHora) {
            const container = document.getElementById('partidos-container');
            if (!container) return;
            
            // Filtramos las filas que tengan un equipo local válido y que no sea la cabecera
            const partidosValidos = rows.filter((fila, idx) => idx > 0 && fila && fila[idxLocal] && fila[idxLocal].toLowerCase() !== 'local');
            
            if (partidosValidos.length === 0) {
                container.innerHTML = `<div style="color:white;text-align:center;padding:20px;">No hay partidos disponibles aún.</div>`;
                return;
            }

            container.innerHTML = partidosValidos.map(fila => {
                const local = fila[idxLocal], visitante = fila[idxVisitante];
                const golesL = fila[idxGolesL], golesV = fila[idxGolesV];
                const hora = fila[idxHora] || '';

                const gL = parseInt(golesL), gV = parseInt(golesV);
                let marcadorHTML = '';
                
                if (!isNaN(gL) && !isNaN(gV)) {
                    marcadorHTML = `<div class="match-score">${gL}:${gV}</div>`;
                } else {
                    marcadorHTML = `<div class="match-score hora">${hora || '-:-'}</div>`;
                }
                
                return `<div class="card"><div class="match-row">
                    <div class="match-team" style="text-align:right;">${local}</div>
                    ${marcadorHTML}
                    <div class="match-team">${visitante}</div>
                </div></div>`;
            }).join('');
        }

        function renderClasificacion(res, stats) {
            const container = document.getElementById('grid-grupos') || document.getElementById('grupos-container');
            if (!container) return;

            const hC = res.headers;
            const idxNombre = hC['nombre'] !== undefined ? hC['nombre'] : 0;
            const idxGrupo = hC['grupo'] !== undefined ? hC['grupo'] : 1;

            const equiposValidos = res.rows.filter((fila, idx) => idx > 0 && fila && fila[idxNombre] && fila[idxNombre].toLowerCase() !== 'nombre');
            if (equiposValidos.length === 0) {
                container.innerHTML = `<div style="color:white;grid-column:1/-1;text-align:center;padding:20px;">No hay clasificación disponible.</div>`;
                return;
            }

            const grupos = {};
            equiposValidos.forEach(fila => {
                const nombre = fila[idxNombre];
                const grupo = fila[idxGrupo] || 'Único';
                if (!grupos[grupo]) grupos[grupo] = [];
                grupos[grupo].push({ nombre: nombre, pts: stats[nombre]?.pts || 0, pj: stats[nombre]?.pj || 0 });
            });

            container.innerHTML = Object.keys(grupos).map(g => {
                const orden = grupos[g].sort((a, b) => b.pts - a.pts);
                return `<div class="card"><div style="padding:10px 15px; background:#f0f0f0; font-weight:bold; font-size:0.8em; color: #666;">GRUPO ${g}</div>
                    <table><thead><tr><th>EQUIPO</th><th class="txt-centro">PJ</th><th class="txt-centro">PTS</th></tr></thead>
                    <tbody>${orden.map(e => `<tr><td><b>${e.nombre}</b></td><td class="txt-centro">${e.pj}</td><td class="txt-centro pts-verde">${e.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }

        function renderGoleadores(res, stats) {
            const container = document.getElementById("body-gol");
            if (!container) return;

            const hG = res.headers;
            const idxNombre = hG['nombre'] !== undefined ? hG['nombre'] : 0;
            const idxEquipo = hG['equipo'] !== undefined ? hG['equipo'] : (hG['club'] !== undefined ? hG['club'] : 1);
            const idxGoles = hG['goles'] !== undefined ? hG['goles'] : 3;

            const jugadoresValidos = res.rows.filter((fila, idx) => idx > 0 && fila && fila[idxNombre] && fila[idxNombre].toLowerCase() !== 'nombre');
            if (jugadoresValidos.length === 0) {
                container.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#666;">No hay goles registrados.</td></tr>`;
                return;
            }

            const orden = jugadoresValidos.sort((a, b) => (parseInt(b[idxGoles]) || 0) - (parseInt(a[idxGoles]) || 0));
            container.innerHTML = orden.map(fila => {
                const nombre = fila[idxNombre], equipo = fila[idxEquipo] || '-', goles = fila[idxGoles] || 0;
                return `<tr><td><b>${nombre}</b></td><td class="txt-club">${equipo}</td><td class="txt-centro">${stats[equipo]?.pj || 0}</td><td class="txt-centro pts-verde">${goles}</td></tr>`;
            }).join('');
        }

        function renderTarjetas(res, stats) {
            const container = document.getElementById("body-tar");
            if (!container) return;

            const hT = res.headers;
            const idxNombre = hT['nombre'] !== undefined ? hT['nombre'] : 0;
            const idxEquipo = hT['equipo'] !== undefined ? hT['equipo'] : (hT['club'] !== undefined ? hT['club'] : 1);
            const idxAmarillas = hT['amarillas'] !== undefined ? hT['amarillas'] : 3;
            const idxSancion = hT['sancion'] !== undefined ? hT['sancion'] : (hT['sanción'] !== undefined ? hT['sanción'] : 4);

            const tarjetasValidas = res.rows.filter((fila, idx) => idx > 0 && fila && fila[idxNombre] && fila[idxNombre].toLowerCase() !== 'nombre');
            if (tarjetasValidas.length === 0) {
                container.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#666;">No hay sanciones registradas.</td></tr>`;
                return;
            }

            const orden = tarjetasValidas.sort((a, b) => (parseInt(b[idxAmarillas]) || 0) - (parseInt(a[idxAmarillas]) || 0));
            container.innerHTML = orden.map(fila => {
                const nombre = fila[idxNombre], equipo = fila[idxEquipo] || '', amarillas = parseInt(fila[idxAmarillas]) || 0, sancion = fila[idxSancion] || '';
                const pjEquipo = stats[equipo]?.pj || 0;
                
                let estado = 'OK';
                let pjJugador = pjEquipo;

                if (sancion.toLowerCase() === 'sancionado' || sancion.toLowerCase() === 'si') {
                    estado = 'SANCIONADO';
                    pjJugador = Math.max(0, pjEquipo - 1);
                } else {
                    const ciclos = Math.floor(amarillas / 3);
                    if (ciclos > 0) pjJugador = Math.max(0, pjEquipo - ciclos);
                }

                return `<tr>
                    <td><b>${nombre}</b></td>
                    <td class="txt-club">${equipo || '-'}</td>
                    <td class="txt-centro">${pjJugador}</td>
                    <td class="txt-centro"><span class="badge-amarilla">${amarillas}</span></td>
                    <td class="txt-derecha" style="font-weight:bold; color:${estado === 'SANCIONADO' ? 'var(--rojo)' : 'var(--verde)'}">${estado}</td>
                </tr>`;
            }).join('');
        }

        function transformarPartidoBracket(filaFase, titulo, idxL, idxV, idxGL, idxGV) {
            if (!filaFase) return `
                <div class="bracket-match">
                    <div class="bracket-title">${titulo}</div>
                    <div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div>
                    <div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div>
                </div>`;
            
            const local = filaFase[idxL], visitante = filaFase[idxV];
            const gL = parseInt(filaFase[idxGL]), gV = parseInt(filaFase[idxGV]);
            
            const winL = !isNaN(gL) && !isNaN(gV) && gL > gV;
            const winV = !isNaN(gL) && !isNaN(gV) && gV > gL;

            return `
                <div class="bracket-match">
                    <div class="bracket-title">${titulo}</div>
                    <div class="bracket-team-row ${winL ? 'winner' : ''}">
                        <span class="bracket-name">${local || '—'}</span>
                        <span class="bracket-goals ${isNaN(gL) ? 'empty' : ''}">${isNaN(gL) ? '-' : gL}</span>
                    </div>
                    <div class="bracket-team-row ${winV ? 'winner' : ''}">
                        <span class="bracket-name">${visitante || '—'}</span>
                        <span class="bracket-goals ${isNaN(gV) ? 'empty' : ''}">${isNaN(gV) ? '-' : gV}</span>
                    </div>
                </div>`;
        }

        function renderBracket(res) {
            const container = document.getElementById('bracket-container');
            if (!container) return;

            const hE = res.headers;
            const idxLocal = hE['local'] !== undefined ? hE['local'] : 0;
            const idxVisitante = hE['visitante'] !== undefined ? hE['visitante'] : 1;
            const idxGolesL = hE['golesl'] !== undefined ? hE['golesl'] : 2;
            const idxGolesV = hE['golesv'] !== undefined ? hE['golesv'] : 3;
            const idxFase = hE['fase'] !== undefined ? hE['fase'] : 4;

            const fasesValidas = res.rows.filter((fila, idx) => idx > 0 && fila && fila[idxFase] && fila[idxFase].toLowerCase() !== 'fase');
            if (fasesValidas.length === 0) {
                container.innerHTML = `<div style="color:white;text-align:center;padding:20px;width:100%;">No hay eliminatorias disponibles.</div>`;
                return;
            }

            const buscarFase = (nombre) => fasesValidas.find(f => f[idxFase].toLowerCase().trim() === nombre.toLowerCase().trim());

            container.innerHTML = `
                <div class="bracket-column">
                    ${transformarPartidoBracket(buscarFase('Cuartos 1'), 'Cuartos 1', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                    ${transformarPartidoBracket(buscarFase('Cuartos 2'), 'Cuartos 2', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                    ${transformarPartidoBracket(buscarFase('Cuartos 3'), 'Cuartos 3', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                    ${transformarPartidoBracket(buscarFase('Cuartos 4'), 'Cuartos 4', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                </div>
                <div class="bracket-column">
                    ${transformarPartidoBracket(buscarFase('Semifinal 1'), 'Semifinal 1', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                    ${transformarPartidoBracket(buscarFase('Semifinal 2'), 'Semifinal 2', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                </div>
                <div class="bracket-column final-col">
                    ${transformarPartidoBracket(buscarFase('Final'), '🏆 GRAN FINAL', idxLocal, idxVisitante, idxGolesL, idxGolesV)}
                </div>
            `;
        }

        function ver(s) {
            ['partidos', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                const elem = document.getElementById(id);
                const btn = document.getElementById('btn-' + id);
                if (elem) elem.classList.toggle('hidden', id !== s);
                if (btn) btn.classList.toggle('active', id === s);
            });
        }
        
        cargarTodo();
    </script>
</body>
</html>

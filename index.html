<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa</title>
    <style>
        :root { 
            --azul-oscuro: #1b3a4b; 
            --azul-menu: #142d3b;   
            --verde-activo: #229954; 
            --amarillo: #f1c40f;
            --rojo-alerta: #e74c3c;
            --white: #ffffff;
            --text-muted: #bdc3c7;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--azul-oscuro); 
            color: #333; 
        }

        #nav { 
            width: 280px; 
            background: var(--azul-menu); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.4); 
            flex-shrink: 0;
        }

        .title-app { 
            padding: 25px 15px; 
            text-align: center; 
            font-weight: 800; 
            background: rgba(0,0,0,0.3); 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-size: 1.1em;
        }

        .nav-links { display: flex; flex-direction: column; }

        .btn { 
            padding: 18px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95em;
            color: var(--text-muted);
        }

        .btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .btn.active { background: var(--verde-activo); color: white; font-weight: bold; border-left: 5px solid white; }

        #content { flex: 1; padding: 20px; overflow-y: auto; }

        .seccion-titulo { 
            color: var(--white); 
            font-size: 1.6em; 
            margin-bottom: 20px; 
            font-weight: 700; 
            border-bottom: 4px solid var(--verde-activo); 
            display: inline-block; 
            padding-bottom: 5px; 
        }

        .card { 
            background: var(--white); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            margin-bottom: 20px;
        }

        #grupos-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #7f8c8d; font-size: 0.75em; text-transform: uppercase; padding: 10px 5px; border-bottom: 2px solid #f2f2f2; }
        td { padding: 12px 5px; border-bottom: 1px solid #f8f9fa; font-size: 0.95em; }

        .pts-bold { color: white; background: var(--azul-oscuro); border-radius: 4px; padding: 2px 6px; font-weight: bold; }
        .tarjeta-box { width: 12px; height: 16px; background: var(--amarillo); display: inline-block; border-radius: 2px; vertical-align: middle; }
        
        .sancionado-num { 
            color: var(--rojo-alerta); 
            font-weight: 900; 
            background: #fdedec; 
            padding: 4px 8px; 
            border-radius: 4px;
            border: 1px solid var(--rojo-alerta);
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #nav { width: 100%; height: auto; position: sticky; top: 0; }
            .nav-links { flex-direction: row; overflow-x: auto; }
            .btn { flex-shrink: 0; padding: 12px 15px; font-size: 0.75em; border-bottom: none; }
            .btn.active { border-left: none; border-bottom: 4px solid white; }
        }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="title-app">🏆 Torneo La Yesa</div>
        <div class="nav-links">
            <div id="btn-grupos" class="btn active" onclick="ver('grupos')">📊 Fase de Grupos</div>
            <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
            <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas Amarillas</div>
        </div>
    </nav>

    <main id="content">
        <div id="grupos">
            <div class="seccion-titulo">Clasificación</div>
            <div id="grupos-container">Cargando datos...</div>
        </div>

        <div id="gol" class="hidden">
            <div class="seccion-titulo">Pichichi</div>
            <div class="card" style="max-width: 550px;">
                <table id="tabla-gol">
                    <thead><tr><th>Pos</th><th>Jugador</th><th>Equipo</th><th>Goles</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones</div>
            <div class="card" style="max-width: 650px;">
                <table id="tabla-tar">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th>Equipo</th>
                            <th style="text-align:center"><div class="tarjeta-box"></div></th>
                            <th style="text-align:center">Partidos</th>
                            <th style="text-align:center">Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg'; 

        async function cargarTodo() {
            try {
                // Cambiado a 'Clasificacion' sin tilde para que coincida con tu Excel
                const resC = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`);
                renderClasificacion(await resC.json());

                const resG = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`);
                renderGoleadores(await resG.json());

                const resT = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`);
                renderTarjetas(await resT.json());

            } catch (e) { console.error("Error al cargar:", e); }
        }

        function renderClasificacion(data) {
            const container = document.getElementById('grupos-container');
            container.innerHTML = "";
            const grupos = {};
            data.forEach(item => {
                if (!grupos[item.Grupo]) grupos[item.Grupo] = [];
                grupos[item.Grupo].push(item);
            });
            Object.keys(grupos).sort().forEach(gId => {
                grupos[gId].sort((a, b) => (parseInt(b.Puntos) - parseInt(a.Puntos)) || (parseInt(b.Diferencia) - parseInt(a.Diferencia)));
                let html = `<div class="card"><h3>Grupo ${gId}</h3><table><thead><tr><th>Pos</th><th>Equipo</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
                grupos[gId].forEach((e, i) => {
                    html += `<tr><td>${i+1}º</td><td><b>${e.Nombre}</b></td><td>${e.Diferencia}</td><td><span class="pts-bold">${e.Puntos}</span></td></tr>`;
                });
                container.innerHTML += html + `</tbody></table></div>`;
            });
        }

        function renderGoleadores(data) {
            data.sort((a, b) => parseInt(b.Goles) - parseInt(a.Goles));
            document.querySelector("#tabla-gol tbody").innerHTML = data.map((j, i) => `
                <tr><td>${i+1}º</td><td><b>${j.Nombre}</b></td><td style="color:gray">${j.Equipo}</td><td style="color:var(--verde-activo); font-weight:bold">${j.Goles}</td></tr>
            `).join('');
        }

        function renderTarjetas(data) {
            // Ordenamos por amarillas (de más a menos)
            data.sort((a, b) => parseInt(b.Amarillas) - parseInt(a.Amarillas));
            
            document.querySelector("#tabla-tar tbody").innerHTML = data.map(j => {
                const numAmarillas = parseInt(j.Amarillas) || 0;
                const esSancionado = numAmarillas > 0 && numAmarillas % 3 === 0;
                
                return `
                <tr>
                    <td><b>${j.Nombre}</b></td>
                    <td style="color:gray">${j.Equipo}</td>
                    <td style="text-align:center">
                        <span class="${esSancionado ? 'sancionado-num' : ''}">${numAmarillas}</span>
                    </td>
                    <td style="text-align:center; font-weight:bold;">${j.Partidos || 0}</td>
                    <td style="text-align:center">
                        ${esSancionado ? '<b style="color:#e74c3c">⚠️ SANCIONADO</b>' : '<small style="color:#2ecc71">Disponible</small>'}
                    </td>
                </tr>
            `}).join('');
        }

        function ver(s) {
            const secciones = ['grupos', 'gol', 'tar'];
            secciones.forEach(sec => {
                const el = document.getElementById(sec);
                const btn = document.getElementById('btn-' + sec);
                if(el) el.classList.toggle('hidden', sec !== s);
                if(btn) btn.classList.toggle('active', sec === s);
            });
        }

        cargarTodo();
        setInterval(cargarTodo, 30000); 
    </script>
</body>
</html>

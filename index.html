<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .btn { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; border-left: 5px solid white; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: var(--blanco); border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow: hidden; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <nav id="nav">
        <div style="padding: 20px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.2);">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="partidos">
            <div class="seccion-titulo">Resultados</div>
            <div id="partidos-container">Cargando partidos...</div>
        </div>

        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones</div>
            <div class="card" style="padding:10px;">
                <table id="tabla-tar">
                    <thead><tr><th>Jugador</th><th>🟨</th><th>PJ</th><th>Estado</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                // Carga Partidos
                const resP = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`);
                const partidos = await resP.json();
                renderPartidos(partidos);

                // Carga Tarjetas
                const resT = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`);
                const tarjetas = await resT.json();
                renderTarjetas(tarjetas);
            } catch (e) { console.error("Error al cargar:", e); }
        }

        function renderPartidos(data) {
            const container = document.getElementById('partidos-container');
            if(!data.length) return;

            container.innerHTML = data.map(m => `
                <div class="card">
                    <div style="text-align:center; padding: 5px; background: #f8f9fa; color: #7f8c8d; font-size: 0.8em; font-weight: bold;">
                        🕒 HORA: ${m.Hora || '--:--'}
                    </div>
                    
                    <div style="display:flex; justify-content:center; align-items:center; padding: 20px 10px;">
                        <div style="flex:1; text-align:right; font-weight:800; color:var(--azul-oscuro); font-size:1.1em;">${m.Local}</div>
                        
                        <div style="background:var(--azul-oscuro); color:white; padding:8px 15px; border-radius:10px; margin:0 15px; font-weight:900; font-size:1.4em; min-width:50px; text-align:center;">
                            ${m.GolesL || 0} - ${m.GolesV || 0}
                        </div>
                        
                        <div style="flex:1; text-align:left; font-weight:800; color:var(--azul-oscuro); font-size:1.1em;">${m.Visitante}</div>
                    </div>

                    <div style="display:flex; justify-content:space-between; padding: 10px; border-top: 1px solid #eee; font-size: 0.85em; background: #fff;">
                        <div style="flex:1; text-align:right; padding-right:15px; color:#555; border-right: 1px solid #eee;">${m.DetalleL || ''}</div>
                        <div style="flex:1; text-align:left; padding-left:15px; color:#555;">${m.DetalleV || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderTarjetas(data) {
            const tbody = document.querySelector("#tabla-tar tbody");
            tbody.innerHTML = data.map(j => {
                const am = parseInt(j.Amarillas) || 0;
                const pj = j.Partidos || 0;
                const sancionado = am > 0 && am % 3 === 0;
                return `<tr>
                    <td><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                    <td><span style="background:#f1c40f; padding:2px 6px; border-radius:4px;">${am}</span></td>
                    <td>${pj}</td>
                    <td>${sancionado ? '<b style="color:#e74c3c">⚠️ SANCIONADO</b>' : '<b style="color:#2ecc71">✅ OK</b>'}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            document.getElementById('partidos').classList.toggle('hidden', s !== 'partidos');
            document.getElementById('tar').classList.toggle('hidden', s !== 'tar');
            document.getElementById('btn-partidos').classList.toggle('active', s === 'partidos');
            document.getElementById('btn-tar').classList.toggle('active', s === 'tar');
        }

        cargarTodo();
    </script>
</body>
</html>

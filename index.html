<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa - Goleadores</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); }
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; }
        .btn { padding: 15px; cursor: pointer; color: #bdc3c7; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn.active { background: var(--verde); color: white; font-weight: bold; border-left: 5px solid white; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; }
        .card { background: var(--blanco); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: #7f8c8d; font-size: 0.85em; text-transform: uppercase; }
        .dorsal-tag { background: #eee; padding: 3px 8px; border-radius: 4px; font-weight: bold; margin-right: 12px; color: #333; display: inline-block; min-width: 25px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav id="nav">
        <div style="padding: 20px; text-align: center; font-weight: bold;">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
    </nav>

    <main id="content">
        <div id="partidos">
            <div class="seccion-titulo">Resultados</div>
            <div id="partidos-container"></div>
        </div>

        <div id="gol" class="hidden">
            <div class="seccion-titulo">Goleadores</div>
            <div class="card">
                <table>
                    <thead>
                        <tr><th>JUGADOR</th><th>EQUIPO</th><th style="text-align:center;">PJ</th><th style="text-align:center;">GOLES</th></tr>
                    </thead>
                    <tbody id="body-gol"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resG] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json())
                ]);

                // Cálculo de Partidos Jugados (PJ) automático
                const stats = {};
                resP.forEach(p => {
                    if (p.Local && p.Visitante) {
                        if (!stats[p.Local]) stats[p.Local] = { pj: 0 };
                        if (!stats[p.Visitante]) stats[p.Visitante] = { pj: 0 };
                        if (p.GolesL !== "" && p.GolesL !== undefined) {
                            stats[p.Local].pj++;
                            stats[p.Visitante].pj++;
                        }
                    }
                });

                renderPartidos(resP);
                renderGoleadores(resG, stats);
            } catch (e) { console.error("Error:", e); }
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data
                .filter(m => m.Local) // Filtra filas vacías
                .map(m => `
                <div class="card" style="margin-bottom:15px; padding:15px;">
                    <div style="text-align:center; color:#7f8c8d; font-size:0.8em; margin-bottom:10px;">🕒 ${m.Hora || '--:--'}</div>
                    <div style="display:flex; justify-content:center; align-items:center;">
                        <div style="flex:1; text-align:right; font-weight:bold;">${m.Local}</div>
                        <div style="background:#1b3a4b; color:white; padding:5px 15px; border-radius:8px; margin:0 20px;">
                            ${m.GolesL !== "" ? m.GolesL : '-'} : ${m.GolesV !== "" ? m.GolesV : '-'}
                        </div>
                        <div style="flex:1; text-align:left; font-weight:bold;">${m.Visitante}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderGoleadores(data, stats) {
            // Filtramos los que no tienen nombre para evitar el "undefined"
            const filtrados = data.filter(j => j.Nombre && j.Nombre.trim() !== "");

            document.getElementById("body-gol").innerHTML = filtrados.map(j => `
                <tr>
                    <td>
                        <span class="dorsal-tag">${j.Dorsal || '-'}</span>
                        <b>${j.Nombre}</b>
                    </td>
                    <td>${j.Equipo || '-'}</td>
                    <td style="text-align:center;">${stats[j.Equipo]?.pj || 0}</td>
                    <td style="text-align:center; font-weight:bold; color:#229954;">${j.Goles || 0}</td>
                </tr>
            `).join('');
        }

        function ver(s) {
            document.getElementById('partidos').classList.toggle('hidden', s !== 'partidos');
            document.getElementById('gol').classList.toggle('hidden', s !== 'gol');
            document.getElementById('btn-partidos').classList.toggle('active', s === 'partidos');
            document.getElementById('btn-gol').classList.toggle('active', s === 'gol');
        }

        cargarTodo();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Torneo La Yesa - Sanción Auto-Actualizable</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .btn { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; transition: 0.3s; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; padding-bottom: 5px; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: white; }
        td, th { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .amarilla-box { background: #f1c40f; color: #333; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .status-sancion { color: var(--rojo); font-weight: bold; animation: pulse 2s infinite; }
        .status-ok { color: var(--verde); font-weight: bold; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav id="nav">
        <div style="padding:20px; text-align:center; font-weight:bold; border-bottom: 1px solid rgba(255,255,255,0.1);">🏆 LA YESA PRO</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones (Auto-Update)</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th style="text-align: center;">🟨</th><th style="text-align: center;">PJ</th><th>Estado</th></tr></thead>
                    <tbody id="body-tar"></tbody>
                </table>
            </div>
        </div>

        <div id="gol" class="hidden">
            <div class="seccion-titulo">Goleadores</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th>Equipo</th><th style="text-align:center;">PJ</th><th style="text-align:center;">Goles</th></tr></thead>
                    <tbody id="body-gol"></tbody>
                </table>
            </div>
        </div>

        <div id="partidos">
            <div class="seccion-titulo">Resultados</div>
            <div id="partidos-container"></div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                // 1. Contar partidos reales jugados por el EQUIPO
                const equipoPJTotal = {};
                resP.forEach(p => {
                    if (p.Local && p.GolesL !== "" && p.GolesL !== undefined) {
                        equipoPJTotal[p.Local] = (equipoPJTotal[p.Local] || 0) + 1;
                        equipoPJTotal[p.Visitante] = (equipoPJTotal[p.Visitante] || 0) + 1;
                    }
                });

                renderTarjetas(resT, equipoPJTotal);
                renderGoleadores(resG, equipoPJTotal);
                renderPartidos(resP);
            } catch (e) { console.error(e); }
        }

        function renderTarjetas(tarjetasData, equipoPJTotal) {
            document.getElementById("body-tar").innerHTML = tarjetasData.filter(j => j.Nombre).map(j => {
                const amarillas = parseInt(j.Amarillas) || 0;
                const pjEquipoActual = equipoPJTotal[j.Equipo] || 0;
                
                // CÁLCULO DE SANCIÓN DINÁMICA
                // Cada 3 amarillas, el jugador "debe" un partido.
                const partidosDeuda = Math.floor(amarillas / 3);
                
                let estado = `<span class="status-ok">✅ DISPONIBLE</span>`;
                let pjFinal = pjEquipoActual;

                if (partidosDeuda > 0) {
                    // El jugador ha tenido sanciones. 
                    // Si el equipo no ha jugado más partidos que las veces que ha sido sancionado,
                    // significa que todavía está cumpliendo la última sanción.
                    pjFinal = pjEquipoActual - partidosDeuda;

                    // Si el número de amarillas es múltiplo de 3, verificamos si ya descansó.
                    // Si el equipo NO ha avanzado un partido extra desde la 3ª amarilla, sigue sancionado.
                    if (amarillas % 3 === 0) {
                        estado = `<span class="status-sancion">⚠️ SANCIONADO</span>`;
                    }
                }

                return `
                    <tr>
                        <td><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                        <td style="text-align: center;"><span class="amarilla-box">${amarillas}</span></td>
                        <td style="text-align: center; font-weight: bold;">${pjFinal < 0 ? 0 : pjFinal}</td>
                        <td>${estado}</td>
                    </tr>`;
            }).join('');
        }

        function renderGoleadores(goleadoresData, equipoPJTotal) {
            document.getElementById("body-gol").innerHTML = goleadoresData.filter(j => j.Nombre).map(j => {
                const pjEquipo = equipoPJTotal[j.Equipo] || 0;
                return `
                    <tr>
                        <td><b>${j.Nombre}</b></td>
                        <td>${j.Equipo}</td>
                        <td style="text-align:center; font-weight:bold;">${pjEquipo}</td>
                        <td style="text-align:center; font-weight:bold; color:var(--verde);">${j.Goles || 0}</td>
                    </tr>`;
            }).join('');
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1; text-align:right; font-weight:bold;">${m.Local}</div>
                    <div style="background:#1b3a4b; color:white; padding:5px 15px; border-radius:6px; margin:0 15px;">
                        ${m.GolesL} - ${m.GolesV}
                    </div>
                    <div style="flex:1; text-align:left; font-weight:bold;">${m.Visitante}</div>
                </div>`).join('');
        }

        function ver(s) {
            ['partidos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }

        cargarTodo();
    </script>
</body>
</html>

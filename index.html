<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa - Control Automático</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-header { padding: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; transition: 0.3s; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; }
        
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; padding-bottom: 5px; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        td, th { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: #666; font-size: 0.85em; text-transform: uppercase; }
        .hidden { display: none; }
        
        .dorsal-text { color: #7f8c8d; font-weight: bold; margin-right: 5px; }
        .amarilla-box { background: #f1c40f; color: #333; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .status-sancion { color: var(--rojo); font-weight: bold; }
        .status-ok { color: var(--verde); font-weight: bold; }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="nav-header">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 Clasificación</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones Automáticas</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th style="text-align: center;">🟨</th><th style="text-align: center;">PJ</th><th>Estado</th></tr></thead>
                    <tbody id="body-tar"></tbody>
                </table>
            </div>
        </div>

        <div id="partidos"><div class="seccion-titulo">Resultados</div><div id="partidos-container"></div></div>
        <div id="grupos" class="hidden"><div class="seccion-titulo">Clasificación</div><div id="grupos-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;"></div></div>
        <div id="gol" class="hidden"><div class="seccion-titulo">Goleadores</div><div class="card"><table><thead><tr><th>Jugador</th><th>Equipo</th><th style="text-align:center;">Goles</th></tr></thead><tbody id="body-gol"></tbody></table></div></div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                // 1. Calcular Partidos Totales del Equipo
                const equipoPJTotal = {};
                resP.forEach(p => {
                    if (p.Local && p.GolesL !== "" && p.GolesL !== undefined) {
                        equipoPJTotal[p.Local] = (equipoPJTotal[p.Local] || 0) + 1;
                        equipoPJTotal[p.Visitante] = (equipoPJTotal[p.Visitante] || 0) + 1;
                    }
                });

                renderTarjetas(resT, equipoPJTotal);
                renderGoleadores(resG);
                renderPartidos(resP);
                renderClasificacion(resC, equipoPJTotal);
            } catch (e) { console.error(e); }
        }

        function renderTarjetas(tarjetasData, equipoPJTotal) {
            document.getElementById("body-tar").innerHTML = tarjetasData.filter(j => j.Nombre).map(j => {
                const amarillas = parseInt(j.Amarillas) || 0;
                const pjEquipo = equipoPJTotal[j.Equipo] || 0;
                
                // Lógica de Sanción: Cada 3 amarillas es un partido de castigo
                let esCicloSancion = (amarillas > 0 && amarillas % 3 === 0);
                
                // Si está en ciclo de sanción (3, 6, 9...), se le resta el partido actual al jugador
                let pjCalculados = esCicloSancion ? (pjEquipo - 1) : pjEquipo;
                if (pjCalculados < 0) pjCalculados = 0;

                let estado = esCicloSancion ? 
                    `<span class="status-sancion">⚠️ SANCIONADO</span>` : 
                    `<span class="status-ok">✅ DISPONIBLE</span>`;

                return `
                    <tr>
                        <td>
                            <span class="dorsal-text">${j.Dorsal || ''}</span>
                            <b>${j.Nombre}</b><br><small>${j.Equipo}</small>
                        </td>
                        <td style="text-align: center;"><span class="amarilla-box">${amarillas}</span></td>
                        <td style="text-align: center; font-weight: bold;">${pjCalculados}</td>
                        <td>${estado}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderGoleadores(data) {
            document.getElementById("body-gol").innerHTML = data.filter(j => j.Nombre).map(j => `
                <tr>
                    <td><span class="dorsal-text">${j.Dorsal || ''}</span>${j.Nombre}</td>
                    <td>${j.Equipo}</td>
                    <td style="text-align:center; font-weight:bold; color:var(--verde);">${j.Goles || 0}</td>
                </tr>
            `).join('');
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1; text-align:right; font-weight:bold;">${m.Local}</div>
                    <div style="background:#1b3a4b; color:white; padding:5px 15px; border-radius:6px; margin:0 15px;">
                        ${m.GolesL !== "" ? m.GolesL : '-'} : ${m.GolesV !== "" ? m.GolesV : '-'}
                    </div>
                    <div style="flex:1; text-align:left; font-weight:bold;">${m.Visitante}</div>
                </div>
            `).join('');
        }

        function renderClasificacion(data, equipoPJTotal) {
            const container = document.getElementById('grupos-container');
            const grupos = {};
            data.filter(e => e.Nombre).forEach(e => {
                if (!grupos[e.Grupo]) grupos[e.Grupo] = [];
                grupos[e.Grupo].push(e);
            });
            container.innerHTML = Object.keys(grupos).map(g => `
                <div class="card" style="padding:15px;">
                    <h3 style="margin-top:0;">Grupo ${g}</h3>
                    <table>
                        <thead><tr><th>Equipo</th><th>PJ</th><th>PTS</th></tr></thead>
                        <tbody>${grupos[g].map(e=>`<tr><td>${e.Nombre}</td><td>${equipoPJTotal[e.Nombre] || 0}</td><td style="font-weight:bold; color:var(--verde);">0</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            `).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }

        cargarTodo();
    </script>
</body>
</html>

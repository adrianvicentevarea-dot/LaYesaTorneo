<style>
    /* Estilos nuevos para los detalles del partido */
    .detalles-container {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed #eee;
        font-size: 0.85em;
    }
    .col-detalle { flex: 1; display: flex; flex-direction: column; }
    .izq { text-align: right; padding-right: 15px; color: #555; }
    .der { text-align: left; padding-left: 15px; color: #555; }
    .evento-gol { color: #229954; font-weight: 600; }
    .evento-tarjeta { color: #f1c40f; font-weight: 600; }
</style>

<script>
function renderPartidos(data) {
    const container = document.getElementById('partidos-container');
    container.innerHTML = data.map(m => `
        <div class="card">
            <div style="text-align:center; margin-bottom:10px;">
                <small style="color:#7f8c8d; font-weight:bold;">🕒 ${m.Hora || 'TBD'}</small>
            </div>
            
            <div style="display:flex; justify-content:center; align-items:center;">
                <span style="flex:1; text-align:right; font-weight:700; color:var(--azul-oscuro); font-size:1.1em;">${m.Local}</span>
                <span class="vs-text">VS</span>
                <span style="flex:1; text-align:left; font-weight:700; color:var(--azul-oscuro); font-size:1.1em;">${m.Visitante}</span>
            </div>

            <div class="detalles-container">
                <div class="col-detalle izq">
                    ${m.GolesLocal && m.GolesLocal !== '-' ? `<span class="evento-gol">⚽ ${m.GolesLocal}</span>` : ''}
                    ${m.TarjetasLocal && m.TarjetasLocal !== '-' ? `<span class="evento-tarjeta">🟨 ${m.TarjetasLocal}</span>` : ''}
                </div>

                <div class="col-detalle der">
                    ${m.GolesVisitante && m.GolesVisitante !== '-' ? `<span class="evento-gol">${m.GolesVisitante} ⚽</span>` : ''}
                    ${m.TarjetasVisitante && m.TarjetasVisitante !== '-' ? `<span class="evento-tarjeta">${m.TarjetasVisitante} 🟨</span>` : ''}
                </div>
            </div>
        </div>
    `).join('');
}
</script>

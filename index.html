<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa - Dashboard Unificado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --navy-deep: #0f172a; 
            --navy-nav: #1e293b; 
            --brand-accent: #10b981; 
            --white: #ffffff; 
            --danger: #ef4444; 
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --card-bg: #ffffff;
            --bg-body: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-body); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* SIDEBAR */
        #sidebar { 
            width: 220px; 
            background: var(--navy-nav); 
            color: var(--white); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 1001;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .nav-header { 
            padding: 30px 20px; 
            font-family: 'Outfit', sans-serif;
            font-weight: 700; 
            text-align: left; 
            font-size: 1.2em; 
            color: var(--brand-accent); 
            letter-spacing: -0.5px; 
            text-transform: uppercase;
        }
        .btn { 
            padding: 18px 20px; 
            cursor: pointer; 
            color: var(--text-dim); 
            font-size: 0.9em; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .btn i { width: 20px; text-align: center; }
        .btn:hover { background: rgba(255,255,255,0.03); color: var(--white); }
        .btn.active { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--brand-accent); 
            border-left: 3px solid var(--brand-accent);
        }

        /* MAIN CONTENT AREA */
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
            background: #f8fafc;
        }
        
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            padding: 15px 30px; 
            background: var(--white); 
            border-bottom: 1px solid #e2e8f0;
            z-index: 10; 
        }
        .selector-torneo { 
            background: var(--white); 
            color: var(--navy-deep); 
            border: 1px solid #cbd5e1; 
            padding: 10px 15px; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-radius: 8px; 
            outline: none; 
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
        }
        .seccion-titulo { 
            color: var(--navy-deep); 
            font-family: 'Outfit', sans-serif;
            font-size: 1.8em; 
            margin-bottom: 30px; 
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
        }
        .seccion-titulo::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* CARDS & TABLES */
        .grid-grupos { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; }
        .card { 
            background: var(--white); 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            border: 1px solid #e2e8f0;
            overflow: hidden; 
        }
        
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 0.95em; }
        th { background: #f8fafc; color: #64748b; font-size: 0.75em; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700; }
        td b { color: var(--navy-deep); font-weight: 600; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #64748b; font-style: italic; }
        .pts-verde { color: var(--brand-accent); font-weight: 700; font-size: 1.1em; }
        .badge-amarilla { background: #fef08a; padding: 4px 8px; border-radius: 4px; font-weight: 700; color: #854d0e; font-size: 0.85em; }

        /* MATCH ROWS */
        .match-row { padding: 25px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .match-team { flex: 1; font-weight: 700; color: var(--navy-deep); font-size: 1.1em; }
        .match-score { 
            background: var(--navy-deep); 
            color: var(--white); 
            padding: 8px 16px; 
            border-radius: 8px; 
            min-width: 80px; 
            text-align: center; 
            font-weight: 700; 
            font-size: 1.2em;
            font-family: 'Outfit', sans-serif;
        }
        .match-score.hora { background: #f1f5f9; color: #64748b; font-size: 0.9em; border: 1px solid #e2e8f0; }

        /* BRACKETS */
        .bracket-wrapper { display: flex; gap: 40px; padding: 20px 0; overflow-x: auto; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 260px; gap: 20px; }
        .bracket-match { background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .bracket-title { padding: 10px; font-size: 0.7em; text-align: center; font-weight: 800; color: #94a3b8; text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .bracket-team-row { display: flex; justify-content: space-between; padding: 12px 15px; align-items: center; }
        .bracket-name { font-weight: 600; color: #334155; }
        .bracket-goals { font-weight: 700; color: var(--navy-deep); background: #f1f5f9; padding: 4px 10px; border-radius: 4px; }
        .winner { background: rgba(16, 185, 129, 0.05); }
        .winner .bracket-name { color: var(--brand-accent); }
        .winner .bracket-goals { background: var(--brand-accent); color: white; }

        .hidden { display: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; border-right: none; }
            .nav-header { display: none; }
            .btn { flex: 1; justify-content: center; padding: 15px 10px; border-left: none; border-bottom: 3px solid transparent; white-space: nowrap; }
            .btn.active { border-left: none; border-bottom: 3px solid var(--brand-accent); }
            .grid-grupos { grid-template-columns: 1fr; }
            #content { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="nav-header">LA YESA <span style="color:white">HUB</span></div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')"><i class="fa-solid fa-calendar-day"></i> PARTIDOS</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')"><i class="fa-solid fa-table-list"></i> GRUPOS</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')"><i class="fa-solid fa-trophy"></i> PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')"><i class="fa-solid fa-ranking-star"></i> GOLEADORES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')"><i class="fa-solid fa-copy"></i> SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Torneo Masculino</option>
                <option value="femenino">🙋‍♀️ Torneo Femenino</option>
                <option value="mixto">🤼‍♂️ Torneo Mixto</option>
                <option value="ninos">🧒 Torneo Niños</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos">
                <span class="seccion-titulo">Resultados y Horarios</span>
                <div id="partidos-container"></div>
            </div>

            <div id="grupos" class="hidden">
                <span class="seccion-titulo">Clasificación General</span>
                <div id="grupos-container" class="grid-grupos"></div>
            </div>
            
            <div id="elim" class="hidden">
                <span class="seccion-titulo">Cuadro de Honor</span>
                <div class="bracket-wrapper" id="bracket-container"></div>
            </div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Pichichi del Torneo</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugador</th><th>Club</th><th class="txt-centro">PJ</th><th class="txt-centro">Goles</th></tr>
                        </thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="tar" class="hidden">
                <span class="seccion-titulo">Disciplina y Sanciones</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugador</th><th>Club</th><th class="txt-centro">PJ</th><th class="txt-centro">🟨</th><th class="txt-derecha">Estado</th></tr>
                        </thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '1KyHfl8Ajou5HlKaWOwopSjQN-NKE7SVPeYQhFmcvVbU', 
            mixto: '1rdrR11IM8bzdAoMUQMkBkzXc_xU4vPt8zeVUo_BCgqY',
            ninos: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'      
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function extraerValorCelda(celda) {
            if (!celda) return '';
            if (celda.v !== null && celda.v !== undefined && typeof celda.v === 'string' && celda.v.includes('Date(')) {
                const partes = celda.v.match(/\d+/g);
                if (partes && partes.length >= 5) {
                    return `${partes[3].padStart(2, '0')}:${partes[4].padStart(2, '0')}`;
                }
            }
            if (celda.f !== null && celda.f !== undefined) return celda.f.trim();
            if (celda.v !== null && celda.v !== undefined) return celda.v.toString().trim();
            return '';
        }

        async function consultarGoogleSheet(nombrePestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombrePestaña)}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson));
                
                if (!jsonNeto || !jsonNeto.table || !jsonNeto.table.rows) return { headers: {}, rows: [] };

                const headers = {};
                const rowsRaw = jsonNeto.table.rows;
                if (jsonNeto.table.cols) {
                    jsonNeto.table.cols.forEach((col, idx) => {
                        if (col && col.label) headers[normalizarTexto(col.label)] = idx;
                    });
                }
                if (Object.keys(headers).length === 0 && rowsRaw.length > 0) {
                    rowsRaw[0].c.forEach((celda, idx) => {
                        const val = normalizarTexto(extraerValorCelda(celda));
                        if (val) headers[val] = idx;
                    });
                }
                const rowsProcesadas = rowsRaw.map(r => r && r.c ? r.c.map(celda => extraerValorCelda(celda)) : []);
                return { headers, rows: rowsProcesadas };
            } catch (error) {
                console.error("Error en pestaña: " + nombrePestaña, error);
                return null;
            }
        }

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT, resE] = await Promise.all([
                    consultarGoogleSheet('Partidos'),
                    consultarGoogleSheet('Clasificacion'),
                    consultarGoogleSheet('Goleadores'),
                    consultarGoogleSheet('Tarjetas'),
                    consultarGoogleSheet('Eliminatorias')
                ]);

                const stats = {}; 
                if (resP && resP.rows) {
                    const h = resP.headers;
                    const idxL = h['local'] !== undefined ? h['local'] : (h['equipolocal'] !== undefined ? h['equipolocal'] : 1);
                    const idxV = h['visitante'] !== undefined ? h['visitante'] : (h['equipovisitante'] !== undefined ? h['equipovisitante'] : 2);
                    const idxGL = h['golesl'] !== undefined ? h['golesl'] : 3;
                    const idxGV = h['golesv'] !== undefined ? h['golesv'] : 4;
                    const idxHora = h['hora'] !== undefined ? h['hora'] : 0;

                    resP.rows.forEach((fila, i) => {
                        if (i === 0 || !fila[idxL] || normalizarTexto(fila[idxL]) === 'local' || normalizarTexto(fila[idxL]) === 'equipolocal') return;
                        const loc = fila[idxL].trim(), vis = fila[idxV].trim();
                        if (!stats[loc]) stats[loc] = { pj: 0, pts: 0 };
                        if (!stats[vis]) stats[vis] = { pj: 0, pts: 0 };
                        const gL = parseInt(fila[idxGL]), gV = parseInt(fila[idxGV]);
                        if (!isNaN(gL) && !isNaN(gV)) {
                            stats[loc].pj++; stats[vis].pj++;
                            if (gL > gV) stats[loc].pts += 3;
                            else if (gV > gL) stats[vis].pts += 3;
                            else { stats[loc].pts += 1; stats[vis].pts += 1; }
                        }
                    });
                    renderPartidos(resP.rows, idxL, idxV, idxGL, idxGV, idxHora);
                }

                if (resC) renderClasificacion(resC, stats);
                if (resG) renderGoleadores(resG, stats);
                if (resT) renderTarjetas(resT, stats);
                if (resE) renderBracket(resE);
            } catch (e) { console.error(e); }
        }

        function renderPartidos(rows, idxL, idxV, idxGL, idxGV, idxH) {
            const container = document.getElementById('partidos-container');
            const filtrados = rows.filter((f, i) => i > 0 && f[idxL] && normalizarTexto(f[idxL]) !== 'local' && normalizarTexto(f[idxL]) !== 'equipolocal');
            if (filtrados.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:40px;color:#64748b;">No hay encuentros programados.</div>`;
                return;
            }
            container.innerHTML = filtrados.map(f => {
                const gL = parseInt(f[idxGL]), gV = parseInt(f[idxGV]);
                const score = !isNaN(gL) && !isNaN(gV) ? `<div class="match-score">${gL}:${gV}</div>` : `<div class="match-score hora">${f[idxH] || '-:-'}</div>`;
                return `<div class="card"><div class="match-row"><div class="match-team" style="text-align:right">${f[idxL]}</div>${score}<div class="match-team">${f[idxV]}</div></div></div>`;
            }).join('');
        }

        function renderClasificacion(res, stats) {
            const container = document.getElementById('grupos-container');
            const h = res.headers;
            const idxN = h['nombre'] !== undefined ? h['nombre'] : (h['equipo'] !== undefined ? h['equipo'] : 0);
            const idxG = h['grupo'] !== undefined ? h['grupo'] : 1;
            const equipos = res.rows.filter((f, i) => i > 0 && f[idxN] && normalizarTexto(f[idxN]) !== 'nombre' && normalizarTexto(f[idxN]) !== 'equipo');
            const grupos = {};
            equipos.forEach(f => {
                const grp = f[idxG] || 'Único';
                if (!grupos[grp]) grupos[grp] = [];
                grupos[grp].push({ nombre: f[idxN], pts: stats[f[idxN]]?.pts || 0, pj: stats[f[idxN]]?.pj || 0 });
            });
            container.innerHTML = Object.keys(grupos).map(g => {
                const orden = grupos[g].sort((a, b) => b.pts - a.pts);
                return `<div class="card"><div style="padding:15px;background:#f8fafc;font-weight:700;color:#64748b">GRUPO ${g}</div><table><thead><tr><th>Equipo</th><th class="txt-centro">PJ</th><th class="txt-centro">Pts</th></tr></thead><tbody>${orden.map(e => `<tr><td><b>${e.nombre}</b></td><td class="txt-centro">${e.pj}</td><td class="txt-centro pts-verde">${e.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }

        function renderGoleadores(res, stats) {
            const h = res.headers;
            const idxN = h['nombre'] !== undefined ? h['nombre'] : (h['jugador'] !== undefined ? h['jugador'] : (h['jugadora'] !== undefined ? h['jugadora'] : 0));
            const idxC = h['equipo'] !== undefined ? h['equipo'] : (h['club'] !== undefined ? h['club'] : 1);
            const idxG = h['goles'] !== undefined ? h['goles'] : 2;
            const orden = res.rows.filter((f, i) => i > 0 && f[idxN] && normalizarTexto(f[idxN]) !== 'jugador' && normalizarTexto(f[idxN]) !== 'jugadora').sort((a, b) => (parseInt(b[idxG]) || 0) - (parseInt(a[idxG]) || 0));
            document.getElementById("body-gol").innerHTML = orden.map(f => `<tr><td><b>${f[idxN]}</b></td><td class="txt-club">${f[idxC] || ''}</td><td class="txt-centro">${stats[f[idxC]]?.pj || 0}</td><td class="txt-centro pts-verde">${f[idxG] || 0}</td></tr>`).join('');
        }

        function renderTarjetas(res, stats) {
            const h = res.headers;
            const idxN = h['nombre'] !== undefined ? h['nombre'] : (h['jugador'] !== undefined ? h['jugador'] : (h['jugadora'] !== undefined ? h['jugadora'] : 0));
            const idxC = h['equipo'] !== undefined ? h['equipo'] : (h['club'] !== undefined ? h['club'] : 1);
            const idxA = h['amarillas'] !== undefined ? h['amarillas'] : 2;
            const idxS = h['sancion'] !== undefined ? h['sancion'] : 3;
            document.getElementById("body-tar").innerHTML = res.rows.filter((f, i) => i > 0 && f[idxN] && normalizarTexto(f[idxN]) !== 'jugador' && normalizarTexto(f[idxN]) !== 'jugadora').map(f => {
                const sancion = f[idxS]?.toLowerCase() || '';
                const isSanc = sancion === 'si' || sancion === 'sancionado' || sancion === 'sancionada' || sancion === '1';
                return `<tr><td><b>${f[idxN]}</b></td><td class="txt-club">${f[idxC] || ''}</td><td class="txt-centro">${stats[f[idxC]]?.pj || 0}</td><td class="txt-centro"><span class="badge-amarilla">${f[idxA] || 0}</span></td><td class="txt-derecha" style="font-weight:700;color:${isSanc ? 'var(--danger)' : 'var(--brand-accent)'}">${isSanc ? 'SANCIONADO' : 'HABILITADO'}</td></tr>`;
            }).join('');
        }

        function renderBracket(res) {
            const container = document.getElementById('bracket-container');
            const h = res.headers;
            const idxF = h['fase'] !== undefined ? h['fase'] : 0;
            const idxL = h['local'] !== undefined ? h['local'] : (h['equipolocal'] !== undefined ? h['equipolocal'] : 1);
            const idxV = h['visitante'] !== undefined ? h['visitante'] : (h['equipovisitante'] !== undefined ? h['equipovisitante'] : 4);
            const idxGL = h['golesl'] !== undefined ? h['golesl'] : 2;
            const idxGV = h['golesv'] !== undefined ? h['golesv'] : 3;
            const fases = res.rows.filter((f, i) => i > 0 && f[idxF] && normalizarTexto(f[idxF]) !== 'fase');
            const buscar = (n) => fases.find(f => normalizarTexto(f[idxF]) === normalizarTexto(n));
            const card = (f, t) => {
                if (!f) return `<div class="bracket-match"><div class="bracket-title">${t}</div><div class="bracket-team-row"><span>—</span><span>-</span></div><div class="bracket-team-row"><span>—</span><span>-</span></div></div>`;
                const gL = parseInt(f[idxGL]), gV = parseInt(f[idxGV]);
                return `<div class="bracket-match"><div class="bracket-title">${t}</div><div class="bracket-team-row ${gL > gV ? 'winner' : ''}"><span>${f[idxL]}</span><span class="bracket-goals">${isNaN(gL) ? '-' : gL}</span></div><div class="bracket-team-row ${gV > gL ? 'winner' : ''}"><span>${f[idxV]}</span><span class="bracket-goals">${isNaN(gV) ? '-' : gV}</span></div></div>`;
            };
            container.innerHTML = `<div class="bracket-column">${card(buscar('Cuartos 1'), 'Cuartos 1')}${card(buscar('Cuartos 2'), 'Cuartos 2')}${card(buscar('Cuartos 3'), 'Cuartos 3')}${card(buscar('Cuartos 4'), 'Cuartos 4')}</div><div class="bracket-column">${card(buscar('Semifinal 1'), 'Semi 1')}${card(buscar('Semifinal 2'), 'Semi 2')}</div><div class="bracket-column final-col">${card(buscar('Final'), 'Gran Final')}</div>`;
        }

        function ver(s) {
            ['partidos', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }
        cargarTodo();
    </script>
</body>
</html>

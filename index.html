<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa - Control de Sanciones</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .btn { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; border-left: 5px solid white; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .hidden { display: none; }
        
        /* DORSAL SIEMPRE VISIBLE */
        .dorsal-tag { 
            background: #444; color: white; padding: 3px 8px; border-radius: 4px; 
            font-weight: bold; margin-right: 10px; display: inline-block; min-width: 20px; text-align: center;
        }
        .status-sancion { color: var(--rojo); font-weight: bold; background: #fdeaea; padding: 4px 8px; border-radius: 4px; }
        .status-ok { color: var(--verde); font-weight: bold; }
    </style>
</head>
<body>

    <nav id="nav">
        <div style="padding: 20px; text-align: center; font-weight: bold;">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="partidos"><div class="seccion-titulo">Resultados</div><div id="partidos-container"></div></div>
        
        <div id="gol" class="hidden">
            <div class="seccion-titulo">Goleadores</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th>Equipo</th><th style="text-align:center;">Goles</th></tr></thead>
                    <tbody id="body-gol"></tbody>
                </table>
            </div>
        </div>

        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones Automáticas</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th>🟨</th><th>Estado</th></tr></thead>
                    <tbody id="body-tar"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                // Contar PJ del Equipo mirando resultados en pestaña Partidos
                const equipoPJ = {};
                resP.forEach(p => {
                    if (p.Local && p.GolesL !== "" && p.GolesL !== undefined) {
                        equipoPJ[p.Local] = (equipoPJ[p.Local] || 0) + 1;
                        equipoPJ[p.Visitante] = (equipoPJ[p.Visitante] || 0) + 1;
                    }
                });

                renderPartidos(resP);
                renderGoleadores(resG);
                renderTarjetas(resT, equipoPJ);
            } catch (e) { console.error(e); }
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1; text-align:right;">${m.Local}</div>
                    <div style="background:#1b3a4b; color:white; padding:5px 15px; border-radius:6px; margin:0 15px; font-weight:bold;">
                        ${m.GolesL !== "" ? m.GolesL : '-'} : ${m.GolesV !== "" ? m.GolesV : '-'}
                    </div>
                    <div style="flex:1; text-align:left;">${m.Visitante}</div>
                </div>
            `).join('');
        }

        function renderGoleadores(data) {
            // Asegurar que el Dorsal se lea de la columna C del Excel
            document.getElementById("body-gol").innerHTML = data.filter(j => j.Nombre).map(j => `
                <tr>
                    <td><span class="dorsal-tag">${j.Dorsal || '-'}</span><b>${j.Nombre}</b></td>
                    <td>${j.Equipo}</td>
                    <td style="text-align:center; font-weight:bold; color:var(--verde);">${j.Goles || 0}</td>
                </tr>
            `).join('');
        }

        function renderTarjetas(data, equipoPJ) {
            document.getElementById("body-tar").innerHTML = data.filter(j => j.Nombre).map(j => {
                const amarillas = parseInt(j.Amarillas) || 0;
                const pjJugador = parseInt(j.Partidos) || 0; // PJ que el jugador HA JUGADO realmente
                const pjTotalesEquipo = equipoPJ[j.Equipo] || 0; // PJ que el equipo ha disputado en total

                let estadoHtml = `<span class="status-ok">✅ DISPONIBLE</span>`;

                // LÓGICA DE SANCIÓN INTELIGENTE:
                // Si amarillas son 3, 6, 9...
                if (amarillas > 0 && amarillas % 3 === 0) {
                    // Si el equipo no ha jugado más partidos que el jugador, significa que aún no ha descansado
                    if (pjTotalesEquipo <= pjJugador) {
                        estadoHtml = `<span class="status-sancion">⚠️ SANCIONADO (Descansa este partido)</span>`;
                    }
                }

                return `<tr>
                    <td><span class="dorsal-tag">${j.Dorsal || '-'}</span><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                    <td><span style="background:#f1c40f; padding:2px 6px; border-radius:4px; font-weight:bold;">${amarillas}</span></td>
                    <td>${estadoHtml}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            ['partidos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }

        cargarTodo();
    </script>
</body>
</html>

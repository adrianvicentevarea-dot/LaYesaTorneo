<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa</title>
    <style>
        :root { 
            --azul-oscuro: #1b3a4b; 
            --azul-nav: #142d3b; 
            --verde: #27ae60; 
            --blanco: #ffffff; 
            --rojo: #e74c3c; 
            --en-vivo: #e74c3c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--azul-oscuro); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            position: relative;
        }

        /* MENU LATERAL */
        #sidebar { 
            position: absolute; left: 0; top: 0; bottom: 0; width: 200px; 
            background: var(--azul-nav); color: white; display: flex; flex-direction: column; 
            z-index: 1001; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05);
            transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { transform: translateX(0); }
        .nav-header { padding: 20px 15px; font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1em; color: var(--verde); letter-spacing: 0.5px; }
        .btn { padding: 15px 20px; cursor: pointer; color: #bdc3c7; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85em; font-weight: bold; text-decoration: none; text-align: left; text-transform: uppercase; }
        .btn:hover, .btn.active { background: var(--verde); color: white; }
        #btn-vivo.active { background: var(--en-vivo); }

        /* CONTENEDOR PRINCIPAL */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0, 0, 0, 0.1); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .menu-toggle { background: var(--azul-nav); border: 2px solid var(--verde); color: white; padding: 8px 15px; font-size: 1em; border-radius: 6px; cursor: pointer; display: block; font-weight: bold; }
        .selector-torneo { background: var(--azul-nav); color: white; border: 2px solid var(--verde); padding: 8px 15px; font-size: 0.9em; font-weight: bold; border-radius: 6px; outline: none; cursor: pointer; }
        .selector-torneo option { background: var(--azul-nav); color: white; }

        /* BUSCADOR */
        .search-container { margin-bottom: 12px; display: flex; width: 100%; }
        .search-input { width: 100%; padding: 10px 15px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.1); background: var(--azul-nav); color: white; font-size: 0.9em; outline: none; }
        .search-input:focus { border-color: var(--verde); }

        #menu-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }

        /* TARJETAS Y TABLAS */
        .grid-grupos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .grid-grupos.modo-liga { grid-template-columns: 1fr; }
        .card { background: var(--blanco); border-radius: 6px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 100%; overflow: hidden; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        td, th { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.95em; white-space: nowrap; }
        th { background: #f9f9f9; color: #7f8c8d; font-size: 0.75em; letter-spacing: 0.5px; text-transform: uppercase; font-weight: bold; }
        td b { font-size: 1em; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #777; font-style: italic; }
        .pts-verde { color: var(--verde); font-weight: bold; font-size: 1.1em; }
        .pj-gris { color: #7f8c8d; font-weight: bold; }
        .badge-amarilla { background: #f1c40f; padding: 3px 8px; border-radius: 3px; font-weight: bold; color: #000; font-size: 0.95em; }
        .badge-sancion { background: var(--rojo); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .badge-ok { background: var(--verde); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .brazalete-capitan { background-color: var(--rojo); color: white; font-weight: bold; font-size: 0.75em; padding: 2px 5px; border-radius: 3px; margin-left: 6px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 1px 2px rgba(0,0,0,0.15); line-height: 1; }

        /* PARTIDOS Y EN VIVO */
        .match-row { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.1em; }
        .match-team { width: 42%; font-weight: bold; color: #333; }
        .match-score { background: var(--azul-nav); color: white; padding: 5px 12px; border-radius: 4px; min-width: 60px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .match-score.hora { background: #7f8c8d; font-size: 0.95em; }
        .live-card { background: linear-gradient(135deg, #ffffff 0%, #fdf2f2 100%); border-left: 5px solid var(--en-vivo); }
        .badge-live-score { background: var(--en-vivo); color: white; font-size: 1.5em; padding: 8px 18px; border-radius: 6px; font-weight: bold; min-width: 80px; text-align: center; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .live-time { font-size: 1.2em; font-weight: bold; color: var(--en-vivo); letter-spacing: 0.5px; }

        /* PLAYOFFS / BRACKET */
        .bracket-wrapper { display: flex; gap: 30px; padding: 10px 5px; overflow-x: auto; align-items: center; -webkit-overflow-scrolling: touch; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; height: 550px; min-width: 220px; flex: 1; }
        .bracket-column.final-col { justify-content: center; min-width: 240px; }
        .bracket-match { background: white; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; font-size: 0.95em; width: 100%; margin-bottom: 10px; }
        .bracket-match-title { background: #f4f6f7; font-size: 0.8em; font-weight: bold; text-align: center; color: #666; border-bottom: 1px solid #ddd; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .bracket-team-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; }
        .bracket-name { font-weight: bold; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .bracket-goals { background: var(--azul-nav); color: white; font-weight: bold; padding: 4px 10px; border-radius: 3px; min-width: 30px; text-align: center; font-size: 1em; }
        .bracket-goals.empty { background: #e0e0e0; color: #999; }
        .winner { background: #ebf5fb; }
        .winner .bracket-name { color: #2980b9; }
        .winner .bracket-goals { background: var(--verde); }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .grid-grupos { grid-template-columns: 1fr; }
            .top-bar { padding: 10px; }
            #content { padding: 10px; }
            .bracket-column { height: auto; gap: 15px; }
        }
    </style>
</head>
<body>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div class="nav-header">TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ PARTIDOS</div>
        <div id="btn-vivo" class="btn" onclick="ver('vivo')" style="color: #ff8a8a;">📺 EN VIVO</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 CLASIFICACIÓN</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')">🏆 PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <button class="menu-toggle" onclick="toggleMenu()">☰ MENÚ</button>
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Fútbol Masculino</option>
                <option value="femenino">⚽ Fútbol Femenino</option>
                <option value="mixto">⚽ Fútbol Mixto</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos"><div id="partidos-container"></div></div>
            <div id="vivo" class="hidden"><div id="vivo-container"></div></div>
            <div id="grupos" class="hidden"><div id="grupos-container" class="grid-grupos"></div></div>
            <div id="elim" class="hidden"><div class="bracket-wrapper" id="bracket-container"></div></div>

            <div id="gol" class="hidden">
                <div class="search-container"><input type="text" id="search-gol" class="search-input" placeholder="🔍 Buscar goleador/a..." oninput="filtrarGoleadores(this.value)"></div>
                <div class="card"><div class="table-responsive"><table><thead><tr><th>Jugador/a</th><th>Equipo</th><th class="txt-centro">PJ</th><th class="txt-centro">G</th></tr></thead><tbody id="body-gol"></tbody></table></div></div>
            </div>
            
            <div id="tar" class="hidden">
                <div class="search-container"><input type="text" id="search-tar" class="search-input" placeholder="🔍 Buscar jugador/a..." oninput="filtrarTarjetas(this.value)"></div>
                <div class="card"><div class="table-responsive"><table><thead><tr><th>Jugador/a</th><th>Equipo</th><th class="txt-centro">PJ</th><th class="txt-centro">🟨</th><th class="txt-derecha">Estado</th></tr></thead><tbody id="body-tar"></tbody></table></div></div>
            </div>
        </main>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = sidebar.classList.toggle('open');
            overlay.style.display = isOpen ? 'block' : 'none';
        }

        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '1dtRR1tM1BdcnAMAQLjxMC0v_xXL4vPYBazVUo_BCgcQ', 
            mixto: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        let cachePartidosRows = []; 
        let cacheClasificacionRows = []; 
        let listaGoleadoresCache = [];
        let listaTarjetasCache = [];
        let intervaloCronometroLive = null;
        let intervaloAutoRefresco = null;

        let colIdxGoles = 3;        
        let colIdxPartidosGol = 4;  
        let colIdxAmarillas = 2;    
        let colIdxSancion = 3;      
        let colIdxPartidosTar = 4;  

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function formatearNombreConCapitan(nombreCrudo) {
            if (!nombreCrudo) return '';
            let nombre = nombreCrudo.toString().trim();
            const regexCapitan = /\s*[\(]?\b[cC]\b[\)]?$/;
            if (regexCapitan.test(nombre)) {
                nombre = nombre.replace(regexCapitan, '').trim();
                return `${nombre} <span class="brazalete-capitan" title="Capitán">C</span>`;
            }
            return nombre;
        }

        async function consultarGoogleSheet(nombrePestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombrePestaña)}&nocache=${new Date().getTime()}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}');
                if(inicioJson === -1 || finJson === -1) return { rows: [] };
                
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson + 1));
                if (!jsonNeto || !jsonNeto.table || !jsonNeto.table.rows) return { rows: [] };
                
                return {
                    rows: jsonNeto.table.rows.map(r => {
                        if (!r || !r.c) return [];
                        return r.c.map(celda => {
                            if (!celda) return '';
                            if (celda.v !== null && celda.v !== undefined && typeof celda.v === 'string' && celda.v.includes('Date(')) {
                                const partes = celda.v.match(/\d+/g);
                                if (partes && partes.length >= 5) {
                                    return `${partes[3].padStart(2, '0')}:${partes[4].padStart(2, '0')}`;
                                }
                            }
                            if (celda.v !== null && celda.v !== undefined) return celda.v.toString().trim();
                            if (celda.f !== null && celda.f !== undefined) return celda.f.trim();
                            return '';
                        });
                    })
                };
            } catch (error) { 
                console.error("Error cargando pestaña " + nombrePestaña, error);
                return { rows: [] }; 
            }
        }

        async function cargarTodo() {
            try {
                const resP = await consultarGoogleSheet('Partidos');
                if (resP && resP.rows && resP.rows.length > 0) {
                    cachePartidosRows = resP.rows;
                    renderPartidos(resP.rows); 
                }
                
                const resC = await consultarGoogleSheet('Clasificacion');
                if (resC && resC.rows && resC.rows.length > 0) {
                    cacheClasificacionRows = resC.rows;
                }

                procesarYRenderClasificacionAutomatica();
                
                const resG = await consultarGoogleSheet('Goleadores');
                if (resG && resG.rows && resG.rows.length > 0) {
                    listaGoleadoresCache = resG.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');
                    listaGoleadoresCache.sort((a,b) => (parseInt(b[colIdxGoles])||0)-(parseInt(a[colIdxGoles])||0));
                } else {
                    listaGoleadoresCache = [];
                }
                
                const resS = await consultarGoogleSheet('Tarjetas'); 
                if (resS && resS.rows && resS.rows.length > 0) {
                    listaTarjetasCache = resS.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');
                } else {
                    listaTarjetasCache = [];
                }

                filtrarGoleadores(''); 
                filtrarTarjetas('');
                
                const resE = await consultarGoogleSheet('Eliminatorias');
                if (resE) renderBracketAdaptado(resE);
                
                const resV = await consultarGoogleSheet('EnVivo');
                if (resV) renderEnVivo(resV);
            } catch (e) { console.error("Error global en cargarTodo:", e); }
        }

        // TOP 5 de goleadores por defecto
        function filtrarGoleadores(query) {
            const container = document.getElementById("body-gol"); if (!container) return;
            const q = normalizarTexto(query);
            
            const filtrados = q === '' ? listaGoleadoresCache.slice(0, 5) : listaGoleadoresCache.filter(f => normalizarTexto(f[0]).includes(q));
            
            container.innerHTML = filtrados.map(fila => {
                const golesSaneados = fila[colIdxGoles] && fila[colIdxGoles].toString().trim() !== '' ? fila[colIdxGoles] : '0';
                const partidosSaneados = fila[colIdxPartidosGol] && fila[colIdxPartidosGol].toString().trim() !== '' ? fila[colIdxPartidosGol] : '0';
                return `<tr><td><b>${formatearNombreConCapitan(fila[0])}</b></td><td class="txt-club">${fila[1]||'-'}</td><td class="txt-centro pj-gris">${partidosSaneados}</td><td class="txt-centro pts-verde">${golesSaneados}</td></tr>`;
            }).join('');
        }

        // CORREGIDO: TOP 5 de Sanciones por defecto
        function filtrarTarjetas(query) {
            const container = document.getElementById("body-tar"); if (!container) return;
            const q = normalizarTexto(query);
            
            let listaTarjetasFormateada = listaTarjetasCache.map(fila => {
                return {
                    nombre: fila[0] || '',
                    club: fila[1] || '-',
                    amarillas: parseInt(fila[colIdxAmarillas]) || 0,
                    sancion: fila[colIdxSancion] ? fila[colIdxSancion].toString().trim() : '0',
                    partidos: fila[colIdxPartidosTar] ? fila[colIdxPartidosTar].toString().trim() : '0'
                };
            });

            listaTarjetasFormateada.sort((a, b) => b.amarillas - a.amarillas);

            // Si está vacío, solo muestra los mejores 5 amonestados
            const filtrados = q === '' ? listaTarjetasFormateada.slice(0, 5) : listaTarjetasFormateada.filter(f => normalizarTexto(f.nombre).includes(q));
            
            container.innerHTML = filtrados.map(jugador => {
                let s = jugador.sancion;
                let estado = (s === '1') ? `<span class="badge-sancion">SANCIONADO</span>` : `<span class="badge-ok">OK</span>`;
                
                return `<tr><td><b>${formatearNombreConCapitan(jugador.nombre)}</b></td><td class="txt-club">${jugador.club}</td><td class="txt-centro pj-gris">${jugador.partidos}</td><td class="txt-centro"><span class="badge-amarilla">${jugador.amarillas}</span></td><td class="txt-derecha">${estado}</td></tr>`;
            }).join('');
        }

        function renderPartidos(rows) {
            const container = document.getElementById('partidos-container'); if (!container) return;
            const partidosValidos = rows.filter((fila, idx) => idx > 0 && fila && fila[1] && fila[1].toString().trim() !== '');
            container.innerHTML = partidosValidos.map(fila => {
                const hora = fila[0] || ''; const local = fila[1] || ''; const visitante = fila[2] || '';
                const gL = parseInt(fila[3]), gV = parseInt(fila[4]);
                let marcadorHTML = !isNaN(gL) && !isNaN(gV) ? `<div class="match-score">${gL}:${gV}</div>` : `<div class="match-score hora">${hora || '-:-'}</div>`;
                
                return `<div class="card"><div class="match-row"><div class="match-team" style="text-align:right;">${local}</div>${marcadorHTML}<div class="match-team">${visitante}</div></div></div>`;
            }).join('');
        }

        function procesarYRenderClasificacionAutomatica() {
            const container = document.getElementById('grupos-container'); if (!container) return;
            
            let estadisticas = {};
            let mapaGrupos = {};

            if (cacheClasificacionRows && cacheClasificacionRows.length > 1) {
                cacheClasificacionRows.forEach((fila, idx) => {
                    if (idx === 0 || !fila[0]) return;
                    const club = fila[0].trim();
                    const grupo = fila[1] ? fila[1].trim().toUpperCase() : 'GENERAL';
                    mapaGrupos[normalizarTexto(club)] = grupo;
                    
                    if (!estadisticas[club]) {
                        estadisticas[club] = { nombre: club, grupo: grupo, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dif: 0, pts: 0 };
                    }
                });
            }

            if (cachePartidosRows && cachePartidosRows.length > 1) {
                cachePartidosRows.forEach((fila, idx) => {
                    if (idx === 0) return;
                    const local = fila[1] ? fila[1].trim() : '';
                    const visitante = fila[2] ? fila[2].trim() : '';
                    if (!local || !visitante) return;

                    if (!estadisticas[local]) {
                        let g = mapaGrupos[normalizarTexto(local)] || 'GENERAL';
                        estadisticas[local] = { nombre: local, grupo: g, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dif: 0, pts: 0 };
                    }
                    if (!estadisticas[visitante]) {
                        let g = mapaGrupos[normalizarTexto(visitante)] || 'GENERAL';
                        estadisticas[visitante] = { nombre: visitante, group: g, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dif: 0, pts: 0 };
                    }

                    const gL = parseInt(fila[3]);
                    const gV = parseInt(fila[4]);

                    if (!isNaN(gL) && !isNaN(gV)) {
                        estadisticas[local].pj += 1;
                        estadisticas[visitante].pj += 1;
                        
                        estadisticas[local].gf += gL;
                        estadisticas[local].gc += gV;
                        estadisticas[visitante].gf += gV;
                        estadisticas[visitante].gc += gL;

                        if (gL > gV) {
                            estadisticas[local].pg += 1;
                            estadisticas[local].pts += 3;
                            estadisticas[visitante].pp += 1;
                        } else if (gV > gL) {
                            estadisticas[visitante].pg += 1;
                            estadisticas[visitante].pts += 3;
                            estadisticas[local].pp += 1;
                        } else {
                            estadisticas[local].pe += 1;
                            estadisticas[local].pts += 1;
                            estadisticas[visitante].pe += 1;
                            estadisticas[visitante].pts += 1;
                        }
                    }
                });
            }

            let listaEquipos = Object.values(estadisticas);
            listaEquipos.forEach(e => { e.dif = e.gf - e.gc; });

            let gruposFinales = {};

            if (torneoActual === 'femenino' || torneoActual === 'mixto') {
                container.classList.add('modo-liga');
                gruposFinales['GENERAL'] = listaEquipos;
            } else {
                container.classList.remove('modo-liga');
                listaEquipos.forEach(e => {
                    if (!gruposFinales[e.grupo]) gruposFinales[e.grupo] = [];
                    gruposFinales[e.grupo].push(e);
                });
            }

            container.innerHTML = Object.keys(gruposFinales).map(g => {
                let equiposDelGrupo = gruposFinales[g];
                
                equiposDelGrupo.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.dif !== a.dif) return b.dif - a.dif;
                    return b.gf - a.gf;
                });

                return `
                    <div class="card">
                        <div style="padding:10px 15px; background:var(--azul-nav); font-weight:bold; font-size:0.9em; color:white; text-transform:uppercase; letter-spacing:0.5px;">🏆 Clasificación ${g === 'GENERAL' ? 'Liga General' : 'Grupo ' + g}</div>
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 40px;" class="txt-centro">POS</th>
                                        <th>EQUIPO</th>
                                        <th class="txt-centro">PJ</th>
                                        <th class="txt-centro">PG</th>
                                        <th class="txt-centro">PE</th>
                                        <th class="txt-centro">PP</th>
                                        <th class="txt-centro">GF</th>
                                        <th class="txt-centro">GC</th>
                                        <th class="txt-centro">DIF</th>
                                        <th class="txt-centro">PTS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${equiposDelGrupo.map((e, index) => `
                                        <tr>
                                            <td class="txt-centro" style="color:#7f8c8d; font-weight:bold;">${index + 1}º</td>
                                            <td><b>${e.nombre}</b></td>
                                            <td class="txt-centro pj-gris">${e.pj}</td>
                                            <td class="txt-centro">${e.pg}</td>
                                            <td class="txt-centro">${e.pe}</td>
                                            <td class="txt-centro">${e.pp}</td>
                                            <td class="txt-centro" style="color:#95a5a6;">${e.gf}</td>
                                            <td class="txt-centro" style="color:#95a5a6;">${e.gc}</td>
                                            <td class="txt-centro" style="font-weight:bold; color:${e.dif > 0 ? 'var(--verde)' : e.dif < 0 ? 'var(--rojo)' : '#333'}">${e.dif > 0 ? '+' + e.dif : e.dif}</td>
                                            <td class="txt-centro pts-verde">${e.pts}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }).join('');
        }

        function renderEnVivo(res) {
            const container = document.getElementById('vivo-container'); if (!container) return;
            if (!res.rows || res.rows.length <= 1) { container.innerHTML = `<div style="color:white;text-align:center;padding:40px;font-size:1.1em;">⏸️ No hay ningún partido en vivo.</div>`; return; }
            
            const filaVivo = res.rows.find((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');
            if (intervaloCronometroLive) clearInterval(intervaloCronometroLive);
            if (!filaVivo) { container.innerHTML = `<div style="color:white;text-align:center;padding:40px;font-size:1.1em;">⏸️ No hay ningún partido en vivo.</div>`; return; }

            const local = filaVivo[0]; const marcador = filaVivo[1] || '0:0'; const visitante = filaVivo[2];
            
            let rawMinutos = (filaVivo[3] || '0').toString().replace(',', '.');
            const minutosRestantesAlActualizar = parseFloat(rawMinutos) || 0;
            const horaDeActualizacionTexto = filaVivo[4] || '';

            container.innerHTML = `
                <div class="card live-card">
                    <div style="padding: 12px 20px; background: rgba(231, 76, 60, 0.05); text-align:center;"><span id="cronometro-live" class="live-time">⏱️ CALCULANDO...</span></div>
                    <div class="match-row" style="padding: 30px 20px;">
                        <div class="match-team" style="text-align:right; font-size:1.25em;">${local}</div>
                        <div class="badge-live-score">${marcador}</div>
                        <div class="match-team" style="font-size:1.25em;">${visitante}</div>
                    </div>
                </div>`;

            const elemCrono = document.getElementById('cronometro-live');

            function construirTextoFormato(valorExcel) {
                if (valorExcel <= 0) return "00:00";
                const minutes = Math.floor(valorExcel);
                let seconds = Math.round((valorExcel - minutes) * 100);
                if (seconds >= 60) seconds = 59;
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            if (horaDeActualizacionTexto.length > 0 && !horaDeActualizacionTexto.match(/\d+:\d+:\d+/) && minutosRestantesAlActualizar === 20) {
                elemCrono.innerText = `📅 PRÓXIMO PARTIDO — HORARIO: ${horaDeActualizacionTexto}`;
                return;
            }

            if (!horaDeActualizacionTexto.includes(':')) { 
                elemCrono.innerText = `⏱️ PAUSA — ${construirTextoFormato(minutosRestantesAlActualizar)}`; 
                return; 
            }

            const partesHora = horaDeActualizacionTexto.split(':');
            const fechaActualizacion = new Date();
            fechaActualizacion.setHours(parseInt(partesHora[0], 10), parseInt(partesHora[1], 10), partesHora[2] ? parseInt(partesHora[2], 10) : 0, 0);

            function actualizarCuentaAtras() {
                const ahora = new Date();
                const segundosTranscurridos = Math.floor((ahora - fechaActualizacion) / 1000);
                
                const minsIniciales = Math.floor(minutosRestantesAlActualizar);
                const segsIniciales = Math.round((minutosRestantesAlActualizar - minsIniciales) * 100);
                const segundosTotalesBase = (minsIniciales * 60) + segsIniciales;

                let segundosFinalesRestantes = segundosTotalesBase - segundosTranscurridos;

                if (segundosFinalesRestantes <= 0) {
                    elemCrono.innerText = `🏁 TIEMPO CONCLUIDO — 00:00`; clearInterval(intervaloCronometroLive);
                } else {
                    const mins = Math.floor(segundosFinalesRestantes / 60); const segs = segundosFinalesRestantes % 60;
                    elemCrono.innerText = `⏱️ EN VIVO — ${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
                }
            }
            actualizarCuentaAtras(); 
            intervaloCronometroLive = setInterval(actualizarCuentaAtras, 1000);
        }

        function transformarPartidoBracket(filaFase, titulo) {
            if (!filaFase) return `<div class="bracket-match"><div class="bracket-match-title">${titulo}</div><div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div><div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div></div>`;
            
            const local = filaFase[1], visitante = filaFase[4], gL = parseInt(filaFase[2]), gV = parseInt(filaFase[3]);
            return `<div class="bracket-match"><div class="bracket-match-title">${titulo}</div><div class="bracket-team-row ${gL>gV?'winner':''}"><span class="bracket-name">${local||'—'}</span><span class="bracket-goals ${isNaN(gL)?'empty':''}">${isNaN(gL)?'-':gL}</span></div><div class="bracket-team-row ${gV>gL?'winner':''}"><span class="bracket-name">${visitante||'—'}</span><span class="bracket-goals ${isNaN(gV)?'empty':''}">${isNaN(gV)?'-':gV}</span></div></div>`;
        }

        // CORREGIDO: Buscador flexible para que reconozca "Semifinal" y "Final" de tu Excel
        function renderBracketAdaptado(res) {
            const container = document.getElementById('bracket-container'); if (!container) return;
            if (!res.rows || res.rows.length <= 1) return;
            const fasesValidas = res.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');
            
            // Busca de manera parcial (ej. si pides 'Semifinal 1' pero tu celda solo dice 'Semifinal')
            const buscarFase = (nombre) => {
                return fasesValidas.find(f => {
                    let txtCelda = normalizarTexto(f[0]);
                    let txtBuscado = normalizarTexto(nombre);
                    return txtCelda.includes(txtBuscado) || txtBuscado.includes(txtCelda);
                });
            };

            if (torneoActual === 'femenino') {
                container.innerHTML = `<div class="bracket-column final-col">${transformarPartidoBracket(buscarFase('Final'), '🏆 GRAN FINAL')}</div>`;
            } else if (torneoActual === 'mixto') {
                container.innerHTML = `
                    <div class="bracket-column">
                        ${transformarPartidoBracket(fasesValidas.filter(f => normalizarTexto(f[0]).includes('semifinal'))[0], 'Semifinal 1')}
                        ${transformarPartidoBracket(fasesValidas.filter(f => normalizarTexto(f[0]).includes('semifinal'))[1], 'Semifinal 2')}
                    </div>
                    <div class="bracket-column final-col">
                        ${transformarPartidoBracket(buscarFase('Final'), '🏆 GRAN FINAL')}
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="bracket-column">
                        ${transformarPartidoBracket(buscarFase('Cuartos 1'), 'Cuartos 1')}
                        ${transformarPartidoBracket(buscarFase('Cuartos 2'), 'Cuartos 2')}
                        ${transformarPartidoBracket(buscarFase('Cuartos 3'), 'Cuartos 3')}
                        ${transformarPartidoBracket(buscarFase('Cuartos 4'), 'Cuartos 4')}
                    </div>
                    <div class="bracket-column">
                        ${transformarPartidoBracket(fasesValidas.filter(f => normalizarTexto(f[0]).includes('semifinal'))[0], 'Semifinal 1')}
                        ${transformarPartidoBracket(fasesValidas.filter(f => normalizarTexto(f[0]).includes('semifinal'))[1], 'Semifinal 2')}
                    </div>
                    <div class="bracket-column final-col">
                        ${transformarPartidoBracket(buscarFase('Final'), '🏆 GRAN FINAL')}
                    </div>`;
            }
        }

        function ver(s) {
            ['partidos', 'vivo', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                const elem = document.getElementById(id); const btn = document.getElementById('btn-' + id);
                if (elem) elem.classList.toggle('hidden', id !== s); if (btn) btn.classList.toggle('active', id === s);
            });
            const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('menu-overlay');
            sidebar.classList.remove('open'); overlay.style.display = 'none';
        }

        window.onload = function() {
            cargarTodo();
            intervaloAutoRefresco = setInterval(cargarTodo, 15000);
        };
    </script>
</body>

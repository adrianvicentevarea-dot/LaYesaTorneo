<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa</title>
    <style>
        :root { 
            --azul-oscuro: #1b3a4b; 
            --azul-nav: #142d3b; 
            --verde: #27ae60; 
            --blanco: #ffffff; 
            --rojo: #e74c3c; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--azul-oscuro); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* MENU LATERAL */
        #sidebar { 
            width: 180px; 
            background: var(--azul-nav); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 1001; 
        }
        .nav-header { 
            padding: 20px 15px; 
            font-weight: bold; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            font-size: 1em; 
            color: var(--verde); 
            letter-spacing: 0.5px; 
        }
        .btn { 
            padding: 15px 20px; 
            cursor: pointer; 
            color: #bdc3c7; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.85em; 
            font-weight: bold; 
            text-decoration: none;
        }
        .btn.active { background: var(--verde); color: white; }

        /* CONTENEDOR PRINCIPAL DERECHO */
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* BARRA SUPERIOR PARA EL DESPLEGABLE */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            padding: 15px 20px; 
            background: rgba(0, 0, 0, 0.1); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10; 
        }
        .selector-torneo { 
            background: var(--azul-nav); 
            color: white; 
            border: 2px solid var(--verde); 
            padding: 8px 15px; 
            font-size: 0.9em; 
            font-weight: bold; 
            border-radius: 6px; 
            outline: none; 
            cursor: pointer; 
        }
        .selector-torneo option { background: var(--azul-nav); color: white; }

        /* CONTENIDO SCROLLABLE */
        #content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }
        .seccion-titulo { 
            color: white; 
            font-size: 1.2em; 
            margin-bottom: 25px; 
            display: block; 
            border-left: 4px solid var(--verde); 
            padding-left: 10px; 
            text-transform: uppercase; 
            font-weight: bold; 
        }

        /* TARJETAS Y CONTENEDORES */
        .grid-grupos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--blanco); border-radius: 6px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 100%; overflow: hidden; }
        
        /* TABLAS */
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 1em; white-space: nowrap; }
        th { background: #f9f9f9; color: #7f8c8d; font-size: 0.75em; letter-spacing: 0.5px; text-transform: uppercase; font-weight: bold; }
        td b { font-size: 1.05em; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #777; font-style: italic; }
        .pts-verde { color: var(--verde); font-weight: bold; font-size: 1.1em; }
        .badge-amarilla { background: #f1c40f; padding: 3px 8px; border-radius: 3px; font-weight: bold; color: #000; font-size: 0.95em; }

        /* PARTIDOS GENERALES */
        .match-row { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.1em; }
        .match-team { width: 42%; font-weight: bold; color: #333; }
        .match-score { background: var(--azul-nav); color: white; padding: 5px 12px; border-radius: 4px; min-width: 60px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .match-score.hora { background: #7f8c8d; font-size: 0.95em; }

        /* PLAYOFFS */
        .bracket-wrapper { display: flex; gap: 30px; padding: 10px 5px; overflow-x: auto; align-items: center; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; height: 550px; min-width: 220px; flex: 1; }
        .bracket-column.final-col { justify-content: center; min-width: 240px; }
        
        .bracket-match { background: white; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; font-size: 0.95em; width: 100%; margin-bottom: 10px; }
        .bracket-title { background: #f4f6f7; font-size: 0.8em; font-weight: bold; text-align: center; color: #666; border-bottom: 1px solid #ddd; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bracket-team-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; }
        .bracket-team-row:last-child { border-bottom: none; }
        .bracket-name { font-weight: bold; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .bracket-goals { background: var(--azul-nav); color: white; font-weight: bold; padding: 4px 10px; border-radius: 3px; min-width: 30px; text-align: center; font-size: 1em; }
        .bracket-goals.empty { background: #e0e0e0; color: #999; }
        
        .winner { background: #ebf5fb; }
        .winner .bracket-name { color: #2980b9; }
        .winner .bracket-goals { background: var(--verde); }

        .hidden { display: none; }

        /* RESPONSIVE PARA MÓVILES */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
            .nav-header { display: none; }
            .btn { flex: 1; text-align: center; padding: 15px 10px; white-space: nowrap; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.05); }
            .grid-grupos { grid-template-columns: 1fr; }
            .top-bar { justify-content: center; padding: 10px; }
            .bracket-column { height: auto; gap: 15px; }
            .bracket-wrapper { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="nav-header">TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ PARTIDOS</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 GRUPOS</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')">🏆 PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Fútbol Masculino</option>
                <option value="femenino">🙋‍♀️ Fútbol Femenino</option>
                <option value="ninos">🧒 Fútbol Pequeños</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos"><span class="seccion-titulo">Resultados y Horarios</span><div id="partidos-container"></div></div>
            <div id="grupos" class="hidden"><span class="seccion-titulo">Clasificación</span><div id="grupos-container" class="grid-grupos"></div></div>
            
            <div id="elim" class="hidden">
                <span class="seccion-titulo">Fase Final</span>
                <div class="bracket-wrapper" id="bracket-container"></div>
            </div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Goleadores</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Club</th>
                                <th class="txt-centro">PJ</th>
                                <th class="txt-centro">G</th>
                            </tr>
                        </thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="tar" class="hidden">
                <span class="seccion-titulo">Sanciones</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Club</th>
                                <th class="txt-centro">PJ</th>
                                <th class="txt-centro">🟨</th>
                                <th class="txt-derecha">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '19lxZHFj-NaSIAT6mjs_Oiqm6UEdKBat5hoHny_UFN1U', 
            ninos: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'      
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        // Nueva función mejorada para descargar los datos directamente de Google de forma segura
        async function consultarGoogleSheet(pestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(pestaña)}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                
                // Limpiar el envoltorio JSON que devuelve Google de forma nativa
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson));
                
                const columnas = jsonNeto.table.cols.map(c => c.label || '');
                return jsonNeto.table.rows.map(r => {
                    const item = {};
                    r.c.forEach((celda, index) => {
                        const nombreCol = columnas[index];
                        if (nombreCol) {
                            item[nombreCol] = celda ? (celda.v !== null ? celda.v : '') : '';
                        }
                    });
                    return item;
                });
            } catch (error) {
                console.error("Error cargando pestaña: " + pestaña, error);
                return [];
            }
        }

        function obtenerPropiedad(objeto, nombreProp) {
            if (!objeto) return '';
            const keyEncontrada = Object.keys(objeto).find(k => k.trim().toLowerCase() === nombreProp.toLowerCase());
            return keyEncontrada ? objeto[keyEncontrada] : '';
        }

        async function cargarTodo() {
            try {
                // Consultamos directamente a Google Sheets de manera independiente
                const [resP, resC, resG, resT, resE] = await Promise.all([
                    consultarGoogleSheet('Partidos'),
                    consultarGoogleSheet('Clasificacion'),
                    consultarGoogleSheet('Goleadores'),
                    consultarGoogleSheet('Tarjetas'),
                    consultarGoogleSheet('Eliminatorias')
                ]);

                const stats = {}; 
                if (Array.isArray(resP)) {
                    resP.forEach(p => {
                        const local = obtenerPropiedad(p, 'Local'), visitante = obtenerPropiedad(p, 'Visitante');
                        if (!local || !visitante) return;
                        const loc = local.toString().trim(), vis = visitante.toString().trim();
                        const gL = parseInt(obtenerPropiedad(p, 'GolesL')), gV = parseInt(obtenerPropiedad(p, 'GolesV'));
                        if (!stats[loc]) stats[loc] = { pj: 0, pts: 0 };
                        if (!stats[vis]) stats[vis] = { pj: 0, pts: 0 };
                        if (!isNaN(gL) && !isNaN(gV)) {
                            stats[loc].pj++; stats[vis].pj++;
                            if (gL > gV) stats[loc].pts += 3;
                            else if (gV > gL) stats[vis].pts += 3;
                            else { stats[loc].pts += 1; stats[vis].pts += 1; }
                        }
                    });
                }

                renderPartidos(resP);
                renderClasificacion(resC, stats);
                renderGoleadores(resG, stats);
                renderTarjetas(resT, stats);
                renderBracket(resE);
            } catch (e) { console.error(e); }
        }

        function crearBloquePartido(p, titulo) {
            if (!p) p = {};
            const local = obtenerPropiedad(p, 'Local'), visitante = obtenerPropiedad(p, 'Visitante');
            const golesL = obtenerPropiedad(p, 'GolesL'), golesV = obtenerPropiedad(p, 'GolesV');
            
            const gL = golesL !== undefined && golesL !== '' ? parseInt(golesL) : NaN;
            const gV = golesV !== undefined && golesV !== '' ? parseInt(golesV) : NaN;
            
            const winL = !isNaN(gL) && !isNaN(gV) && gL > gV;
            const winV = !isNaN(gL) && !isNaN(gV) && gV > gL;

            return `
                <div class="bracket-match">
                    <div class="bracket-title">${titulo}</div>
                    <div class="bracket-team-row ${winL ? 'winner' : ''}">
                        <span class="bracket-name">${local || '—'}</span>
                        <span class="bracket-goals ${isNaN(gL) ? 'empty' : ''}">${isNaN(gL) ? '-' : gL}</span>
                    </div>
                    <div class="bracket-team-row ${winV ? 'winner' : ''}">
                        <span class="bracket-name">${visitante || '—'}</span>
                        <span class="bracket-goals ${isNaN(gV) ? 'empty' : ''}">${isNaN(gV) ? '-' : gV}</span>
                    </div>
                </div>
            `;
        }

        function renderBracket(data) {
            const container = document.getElementById('bracket-container');
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `<div style="color:white;text-align:center;padding:20px;width:100%;">No hay eliminatorias disponibles.</div>`;
                return;
            }
            container.innerHTML = "";

            const buscarPorFase = (nombreFase) => data.find(f => {
                const fase = obtenerPropiedad(f, 'Fase');
                return fase && fase.toString().trim().toLowerCase() === nombreFase.toLowerCase();
            });

            const c1 = buscarPorFase('Cuartos 1');
            const c2 = buscarPorFase('Cuartos 2');
            const c3 = buscarPorFase('Cuartos 3');
            const c4 = buscarPorFase('Cuartos 4');
            const s1 = buscarPorFase('Semifinal 1');
            const s2 = buscarPorFase('Semifinal 2');
            const f1 = buscarPorFase('Final');

            container.innerHTML = `
                <div class="bracket-column">
                    ${crearBloquePartido(c1, 'Cuartos 1')}
                    ${crearBloquePartido(c2, 'Cuartos 2')}
                    ${crearBloquePartido(c3, 'Cuartos 3')}
                    ${crearBloquePartido(c4, 'Cuartos 4')}
                </div>
                <div class="bracket-column">
                    ${crearBloquePartido(s1, 'Semifinal 1')}
                    ${crearBloquePartido(s2, 'Semifinal 2')}
                </div>
                <div class="bracket-column final-col">
                    ${crearBloquePartido(f1, '🏆 GRAN FINAL')}
                </div>
            `;
        }

        function renderPartidos(data) {
            const container = document.getElementById('partidos-container');
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `<div style="color:white;text-align:center;padding:20px;">No hay partidos disponibles aún.</div>`;
                return;
            }
            container.innerHTML = data.filter(m => obtenerPropiedad(m, 'Local')).map(m => {
                const local = obtenerPropiedad(m, 'Local'), visitante = obtenerPropiedad(m, 'Visitante');
                const golesL = obtenerPropiedad(m, 'GolesL'), golesV = obtenerPropiedad(m, 'GolesV');
                const hora = obtenerPropiedad(m, 'Hora');

                const gL = parseInt(golesL), gV = parseInt(golesV);
                let marcadorHTML = '';
                if (!isNaN(gL) && !isNaN(gV)) {
                    marcadorHTML = `<div class="match-score">${gL}:${gV}</div>`;
                } else {
                    const horaPartido = hora ? hora.toString().trim() : '-:-';
                    marcadorHTML = `<div class="match-score hora">${horaPartido}</div>`;
                }
                return `<div class="card"><div class="match-row">
                    <div class="match-team" style="text-align:right;">${local}</div>
                    ${marcadorHTML}
                    <div class="match-team">${visitante}</div>
                </div></div>`;
            }).join('');
        }

        function renderClasificacion(data, stats) {
            const container = document.getElementById('grupos-container');
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `<div style="color:white;grid-column:1/-1;text-align:center;padding:20px;">No hay clasificación disponible.</div>`;
                return;
            }
            const grupos = {};
            data.filter(e => obtenerPropiedad(e, 'Nombre')).forEach(e => {
                const nombre = obtenerPropiedad(e, 'Nombre').toString().trim();
                const grupo = obtenerPropiedad(e, 'Grupo') || 'Único';
                if (!grupos[grupo]) grupos[grupo] = [];
                grupos[grupo].push({ nombre: nombre, pts: stats[nombre]?.pts || 0, pj: stats[nombre]?.pj || 0 });
            });
            container.innerHTML = Object.keys(grupos).map(g => {
                const orden = grupos[g].sort((a, b) => b.pts - a.pts);
                return `<div class="card"><div style="padding:10px 15px; background:#f0f0f0; font-weight:bold; font-size:0.8em; color: #666;">GRUPO ${g}</div>
                    <table><thead><tr><th>EQUIPO</th><th class="txt-centro">PJ</th><th class="txt-centro">PTS</th></tr></thead>
                    <tbody>${orden.map(e => `<tr><td><b>${e.nombre}</b></td><td class="txt-centro">${e.pj}</td><td class="txt-centro pts-verde">${e.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }

        function renderGoleadores(data, stats) {
            const container = document.getElementById("body-gol");
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#666;">No hay goles registrados.</td></tr>`;
                return;
            }
            const orden = data.filter(j => obtenerPropiedad(j, 'Nombre')).sort((a, b) => {
                const golesB = parseInt(obtenerPropiedad(b, 'Goles')) || 0;
                const golesA = parseInt(obtenerPropiedad(a, 'Goles')) || 0;
                return golesB - golesA;
            });
            container.innerHTML = orden.map(j => {
                const nombre = obtenerPropiedad(j, 'Nombre');
                const equipo = (obtenerPropiedad(j, 'Equipo') || obtenerPropiedad(j, 'Club') || '-').toString().trim();
                const goles = obtenerPropiedad(j, 'Goles') || 0;
                return `<tr><td><b>${nombre}</b></td><td class="txt-club">${equipo}</td><td class="txt-centro">${stats[equipo]?.pj || 0}</td><td class="txt-centro pts-verde">${goles}</td></tr>`;
            }).join('');
        }

        function renderTarjetas(data, stats) {
            const container = document.getElementById("body-tar");
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#666;">No hay sanciones registradas.</td></tr>`;
                return;
            }
            const orden = data.filter(j => obtenerPropiedad(j, 'Nombre')).sort((a, b) => {
                const amB = parseInt(obtenerPropiedad(b, 'Amarillas')) || 0;
                const amA = parseInt(obtenerPropiedad(a, 'Amarillas')) || 0;
                return amB - amA;
            });
            container.innerHTML = orden.map(j => {
                const nombre = obtenerPropiedad(j, 'Nombre');
                const equipo = (obtenerPropiedad(j, 'Equipo') || obtenerPropiedad(j, 'Club') || '').toString().trim();
                const amarillas = parseInt(obtenerPropiedad(j, 'Amarillas')) || 0;
                const sancion = obtenerPropiedad(j, 'Sanción') || obtenerPropiedad(j, 'Sancion') || '';
                
                const pjEquipo = stats[equipo]?.pj || 0; 
                const textoCelda = sancion.toString().trim().toLowerCase();
                
                let estado = 'OK';
                let pjJugador = pjEquipo;

                if (textoCelda === 'sancionado' || textoCelda === 'si' || textoCelda === '0') {
                    estado = 'SANCIONADO';
                    pjJugador = pjEquipo - 1; 
                } else {
                    estado = 'OK';
                    const ciclosPasados = Math.floor(amarillas / 3);
                    if (ciclosPasados > 0) pjJugador = pjEquipo - ciclosPasados;
                }

                if (pjJugador < 0) pjJugador = 0;

                return `<tr>
                    <td><b>${nombre}</b></td>
                    <td class="txt-club">${equipo || '-'}</td>
                    <td class="txt-centro">${pjJugador}</td>
                    <td class="txt-centro"><span class="badge-amarilla">${amarillas}</span></td>
                    <td class="txt-derecha" style="font-weight:bold; color:${estado === 'SANCIONADO' ? 'var(--rojo)' : 'var(--verde)'}">${estado}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                const elem = document.getElementById(id);
                const btn = document.getElementById('btn-' + id);
                if (elem) elem.classList.toggle('hidden', id !== s);
                if (btn) btn.classList.toggle('active', id === s);
            });
        }
        cargarTodo();
    </script>
</body>
</html>

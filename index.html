<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa - Gestión PRO</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .btn { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; transition: 0.3s; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; border-left: 5px solid white; }
        
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; padding-bottom: 5px; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .hidden { display: none; }
        
        /* DORSAL VISIBLE */
        .dorsal-tag { 
            background: #333; 
            color: white; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            margin-right: 12px; 
            display: inline-block;
            min-width: 20px;
            text-align: center;
        }

        .status-ok { color: var(--verde); font-weight: bold; }
        .status-sancion { color: var(--rojo); font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav id="nav">
        <div style="padding: 20px; text-align: center; font-weight: bold;">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 Clasificación</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="partidos"><div class="seccion-titulo">Resultados</div><div id="partidos-container"></div></div>
        <div id="grupos" class="hidden"><div class="seccion-titulo">Clasificación</div><div id="grupos-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;"></div></div>
        <div id="gol" class="hidden"><div class="seccion-titulo">Goleadores</div><div class="card"><table><thead><tr><th>Jugador</th><th>Equipo</th><th style="text-align:center;">PJ</th><th style="text-align:center;">Goles</th></tr></thead><tbody id="body-gol"></tbody></table></div></div>
        <div id="tar" class="hidden"><div class="seccion-titulo">Sanciones</div><div class="card"><table><thead><tr><th>Jugador</th><th>🟨</th><th style="text-align:center;">PJ Equipo</th><th>Estado</th></tr></thead><tbody id="body-tar"></tbody></table></div></div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                // 1. Lógica de Estadísticas y Partidos Jugados
                const stats = {};
                resP.forEach(p => {
                    if (p.Local && p.Visitante) {
                        if (!stats[p.Local]) stats[p.Local] = { pts: 0, pj: 0, dg: 0 };
                        if (!stats[p.Visitante]) stats[p.Visitante] = { pts: 0, pj: 0, dg: 0 };
                        if (p.GolesL !== "" && p.GolesL !== undefined) {
                            const gL = parseInt(p.GolesL), gV = parseInt(p.GolesV);
                            stats[p.Local].pj++; stats[p.Visitante].pj++;
                            if (gL > gV) stats[p.Local].pts += 3; else if (gL < gV) stats[p.Visitante].pts += 3; else { stats[p.Local].pts += 1; stats[p.Visitante].pts += 1; }
                        }
                    }
                });

                renderPartidos(resP);
                renderClasificacion(resC, stats);
                renderGoleadores(resG, stats);
                renderTarjetas(resT, stats);
            } catch (e) { console.error(e); }
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:15px; text-align:center;">
                    <div style="font-size:0.8em; color:#7f8c8d;">🕒 ${m.Hora || '--:--'}</div>
                    <div style="display:flex; justify-content:center; align-items:center; margin-top:5px;">
                        <div style="flex:1; text-align:right; font-weight:bold;">${m.Local}</div>
                        <div style="background:#1b3a4b; color:white; padding:4px 12px; border-radius:6px; margin:0 15px;">${m.GolesL !== "" ? m.GolesL : '-'} - ${m.GolesV !== "" ? m.GolesV : '-'}</div>
                        <div style="flex:1; text-align:left; font-weight:bold;">${m.Visitante}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderClasificacion(data, stats) {
            const container = document.getElementById('grupos-container');
            const grupos = {};
            data.filter(e => e.Nombre).forEach(e => {
                const s = stats[e.Nombre] || { pts: 0, pj: 0 };
                if (!grupos[e.Grupo]) grupos[e.Grupo] = [];
                grupos[e.Grupo].push({ ...e, Puntos: s.pts, PJ: s.pj });
            });
            container.innerHTML = Object.keys(grupos).map(g => `
                <div class="card" style="padding:15px;">
                    <h3>Grupo ${g}</h3>
                    <table><thead><tr><th>Equipo</th><th>PJ</th><th>PTS</th></tr></thead>
                    <tbody>${grupos[g].sort((a,b)=>b.Puntos-a.Puntos).map(e=>`<tr><td>${e.Nombre}</td><td>${e.PJ}</td><td style="color:var(--verde); font-weight:bold;">${e.Puntos}</td></tr>`).join('')}</tbody></table>
                </div>
            `).join('');
        }

        function renderGoleadores(data, stats) {
            // Se fuerza la lectura de la columna 'Dorsal'
            const filtrados = data.filter(j => j.Nombre && j.Nombre.trim() !== "");
            document.getElementById("body-gol").innerHTML = filtrados.map(j => `
                <tr>
                    <td><span class="dorsal-tag">${j.Dorsal || '-'}</span><b>${j.Nombre}</b></td>
                    <td>${j.Equipo || '-'}</td>
                    <td style="text-align:center;">${stats[j.Equipo]?.pj || 0}</td>
                    <td style="text-align:center; font-weight:bold; color:var(--verde);">${j.Goles || 0}</td>
                </tr>
            `).join('');
        }

        function renderTarjetas(data, stats) {
            document.getElementById("body-tar").innerHTML = data.filter(j => j.Nombre).map(j => {
                const amarillas = parseInt(j.Amarillas) || 0;
                const pjEquipo = stats[j.Equipo]?.pj || 0;
                
                // LÓGICA DE SANCIÓN:
                // Si tiene 3, 6, 9... amarillas Y el equipo ha jugado exactamente esos partidos o más, 
                // pero queremos que "cumpla" el partido.
                // Usamos el campo 'Partidos' de tu Excel de Tarjetas para comparar si ya cumplió.
                const sancionadoPorCiclo = (amarillas > 0 && amarillas % 3 === 0);
                const haCumplido = parseInt(j.Partidos) >= 1; // Si pones un 1 en la columna 'Partidos' de la pestaña Tarjetas, significa que ya cumplió.

                let estadoHtml = "";
                if (sancionadoPorCiclo && !haCumplido) {
                    estadoHtml = `<span class="status-sancion">⚠️ SANCIONADO (1 PARTIDO)</span>`;
                } else {
                    estadoHtml = `<span class="status-ok">✅ DISPONIBLE</span>`;
                }

                return `<tr>
                    <td><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                    <td><span style="background:#f1c40f; padding:2px 6px; border-radius:4px; font-weight:bold;">${amarillas}</span></td>
                    <td style="text-align:center;">${pjEquipo}</td>
                    <td>${estadoHtml}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }

        cargarTodo();
    </script>
</body>
</html>

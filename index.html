<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-nav: #142d3b; --verde: #27ae60; --blanco: #ffffff; --rojo: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: var(--azul-oscuro); display: flex; height: 100vh; overflow: hidden; }

        /* Menú Lateral Compacto */
        #sidebar { width: 180px; background: var(--azul-nav); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; z-index: 1001; }
        .nav-header { padding: 15px; font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9em; color: var(--verde); }
        .btn { padding: 12px 15px; cursor: pointer; color: #bdc3c7; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85em; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; }

        /* Contenedor Principal */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { background: var(--azul-nav); color: white; padding: 10px 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-toggle { font-size: 1.2em; cursor: pointer; margin-right: 12px; }
        
        #content { flex: 1; padding: 8px; overflow-y: auto; width: 100%; }
        .seccion-titulo { color: white; font-size: 0.9em; margin-bottom: 10px; display: block; border-left: 3px solid var(--verde); padding-left: 8px; text-transform: uppercase; font-weight: bold; }

        /* Tarjetas de Partido Súper Compactas */
        .card { background: var(--blanco); border-radius: 6px; margin-bottom: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); overflow: hidden; }
        .match-row { padding: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 0.8em; }
        .match-team { width: 40%; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .match-score { background: var(--azul-oscuro); color: white; padding: 3px 6px; border-radius: 4px; font-weight: bold; min-width: 42px; text-align: center; font-size: 0.9em; }

        /* Tablas Compactas */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td, th { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f8f9fa; color: #777; font-size: 0.65em; text-transform: uppercase; }

        .col-nom { width: 42%; }
        .col-eq { width: 20%; color: #666; }
        .col-dat { width: 12%; text-align: center; }
        .col-est { width: 26%; text-align: right; padding-right: 5px; }

        .amarilla-box { background: #f1c40f; color: #000; padding: 1px 4px; border-radius: 2px; font-weight: bold; font-size: 0.9em; }
        .status-sancion { color: var(--rojo); font-weight: bold; font-size: 0.8em; }
        .status-ok { color: var(--verde); font-weight: bold; font-size: 0.8em; }
        
        .hidden { display: none; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -180px; height: 100%; }
            #sidebar.open { left: 0; }
            #overlay.open { display: block; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div class="nav-header">TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ PARTIDOS</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 TABLAS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 SANCIONES</div>
    </nav>

    <div id="main-container">
        <header>
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <div style="font-size: 0.9em; font-weight: bold;">TORNEO LA YESA</div>
        </header>

        <main id="content">
            <div id="partidos">
                <span class="seccion-titulo">Resultados</span>
                <div id="partidos-container"></div>
            </div>

            <div id="grupos" class="hidden">
                <span class="seccion-titulo">Clasificación</span>
                <div id="grupos-container"></div>
            </div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Goleadores</span>
                <div class="card">
                    <table>
                        <thead><tr><th class="col-nom">Nombre</th><th class="col-eq">Eq</th><th class="col-dat">PJ</th><th class="col-dat">G</th></tr></thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>

            <div id="tar" class="hidden">
                <span class="seccion-titulo">Sanciones</span>
                <div class="card">
                    <table>
                        <thead><tr><th class="col-nom">Jugador</th><th class="col-dat">🟨</th><th class="col-dat">PJ</th><th class="col-est">Estado</th></tr></thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                const equipoPJ = {}; 
                const tienePendiente = {}; 

                resP.forEach(p => {
                    if (!p.Local) return;
                    const valL = p.GolesL?.toString().trim();
                    const haJugado = (valL !== undefined && valL !== "" && valL !== "-" && !isNaN(valL));
                    if (haJugado) {
                        equipoPJ[p.Local] = (equipoPJ[p.Local] || 0) + 1;
                        equipoPJ[p.Visitante] = (equipoPJ[p.Visitante] || 0) + 1;
                    } else {
                        tienePendiente[p.Local] = true;
                        tienePendiente[p.Visitante] = true;
                    }
                });

                renderPartidos(resP);
                renderClasificacion(resC, equipoPJ);
                renderGoleadores(resG, equipoPJ);
                renderTarjetas(resT, equipoPJ, tienePendiente);

            } catch (e) { console.error(e); }
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card">
                    <div class="match-row">
                        <div class="match-team" style="text-align:right;">${m.Local}</div>
                        <div class="match-score">${m.GolesL} : ${m.GolesV}</div>
                        <div class="match-team">${m.Visitante}</div>
                    </div>
                </div>`).join('');
        }

        function renderClasificacion(data, stats) {
            const container = document.getElementById('grupos-container');
            const grupos = {};
            data.filter(e => e.Nombre).forEach(e => {
                if (!grupos[e.Grupo]) grupos[e.Grupo] = [];
                grupos[e.Grupo].push(e);
            });

            container.innerHTML = Object.keys(grupos).map(g => {
                const ordenados = grupos[g].sort((a, b) => (parseInt(b.Puntos) || 0) - (parseInt(a.Puntos) || 0));
                return `
                <div class="card">
                    <div style="padding:5px 10px; background:#f1f1f1; font-weight:bold; font-size:0.65em;">GRUPO ${g}</div>
                    <table>
                        <thead><tr><th class="col-nom">Equipo</th><th class="col-dat">PJ</th><th class="col-dat">PTS</th></tr></thead>
                        <tbody>${ordenados.map(e => `<tr><td class="col-nom">${e.Nombre}</td><td class="col-dat">${stats[e.Nombre] || 0}</td><td class="col-dat" style="font-weight:bold; color:var(--verde)">${e.Puntos || 0}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }).join('');
        }

        function renderGoleadores(data, stats) {
            const ordenados = data.filter(j => j.Nombre).sort((a, b) => (parseInt(b.Goles) || 0) - (parseInt(a.Goles) || 0));
            document.getElementById("body-gol").innerHTML = ordenados.map(j => `
                <tr>
                    <td class="col-nom"><b>${j.Nombre}</b></td>
                    <td class="col-eq">${j.Equipo.substring(0,6)}</td>
                    <td class="col-dat">${stats[j.Equipo] || 0}</td>
                    <td class="col-dat" style="color:var(--verde); font-weight:bold;">${j.Goles || 0}</td>
                </tr>`).join('');
        }

        function renderTarjetas(data, stats, pend) {
            const ordenados = data.filter(j => j.Nombre).sort((a, b) => (parseInt(b.Amarillas) || 0) - (parseInt(a.Amarillas) || 0));
            document.getElementById("body-tar").innerHTML = ordenados.map(j => {
                const am = parseInt(j.Amarillas) || 0;
                const pjEq = stats[j.Equipo] || 0;
                const esSancion = (am > 0 && am % 3 === 0 && pend[j.Equipo]);
                
                const estado = esSancion ? `<span class="status-sancion">SANCION</span>` : `<span class="status-ok">OK</span>`;
                const pjFinal = esSancion ? pjEq : (pjEq - Math.floor(am / 3));

                return `<tr>
                    <td class="col-nom"><b>${j.Nombre}</b><br><small style="font-size:0.8em; color:#999">${j.Equipo.substring(0,8)}</small></td>
                    <td class="col-dat"><span class="amarilla-box">${am}</span></td>
                    <td class="col-dat">${pjFinal < 0 ? 0 : pjFinal}</td>
                    <td class="col-est">${estado}</td>
                </tr>`;
            }).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
            if (window.innerWidth <= 768) toggleMenu();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        cargarTodo();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneo La Yesa</title>
    <style>
        :root { 
            --azul-oscuro: #1b3a4b; 
            --azul-nav: #142d3b; 
            --verde: #27ae60; 
            --blanco: #ffffff; 
            --rojo: #e74c3c; 
            --en-vivo: #e74c3c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--azul-oscuro); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* MENU LATERAL - Fijo en PC, colapsable en móvil */
        #sidebar { 
            width: 180px; 
            background: var(--azul-nav); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 1001; 
            overflow-y: auto;
            transition: transform 0.3s ease; /* Animación suave al abrir/cerrar */
        }
        .nav-header { 
            padding: 20px 15px; 
            font-weight: bold; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            font-size: 1em; 
            color: var(--verde); 
            letter-spacing: 0.5px; 
        }
        .btn { 
            padding: 15px 20px; 
            cursor: pointer; 
            color: #bdc3c7; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.85em; 
            font-weight: bold; 
            text-decoration: none;
            text-align: left;
        }
        .btn.active { background: var(--verde); color: white; }
        #btn-vivo.active { background: var(--en-vivo); }

        /* CONTENEDOR PRINCIPAL DERECHO */
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* BARRA SUPERIOR */
        .top-bar { 
            display: flex; 
            justify-content: space-between; /* Alinea botón a la izq y selector a la der */
            align-items: center;
            padding: 15px 20px; 
            background: rgba(0, 0, 0, 0.1); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10; 
        }

        /* BOTÓN HAMBURGUESA (Platgar / Desplegar) */
        .menu-toggle {
            background: var(--azul-nav);
            border: 2px solid var(--verde);
            color: white;
            padding: 8px 12px;
            font-size: 1.2em;
            border-radius: 6px;
            cursor: pointer;
            display: none; /* Oculto en ordenadores */
            font-weight: bold;
        }

        .selector-torneo { 
            background: var(--azul-nav); 
            color: white; 
            border: 2px solid var(--verde); 
            padding: 8px 15px; 
            font-size: 0.9em; 
            font-weight: bold; 
            border-radius: 6px; 
            outline: none; 
            cursor: pointer; 
        }
        .selector-torneo option { background: var(--azul-nav); color: white; }

        /* CONTENIDO SCROLLABLE */
        #content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }
        .seccion-titulo { 
            color: white; 
            font-size: 1.2em; 
            margin-bottom: 25px; 
            display: block; 
            border-left: 4px solid var(--verde); 
            padding-left: 10px; 
            text-transform: uppercase; 
            font-weight: bold; 
        }
        .seccion-titulo.vivo-title { border-left-color: var(--en-vivo); }

        /* TARJETAS Y TABLAS */
        .grid-grupos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--blanco); border-radius: 6px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 100%; overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 1em; white-space: nowrap; }
        th { background: #f9f9f9; color: #7f8c8d; font-size: 0.75em; letter-spacing: 0.5px; text-transform: uppercase; font-weight: bold; }
        td b { font-size: 1.05em; }
        
        .txt-centro { text-align: center; }
        .txt-derecha { text-align: right; }
        .txt-club { color: #777; font-style: italic; }
        .pts-verde { color: var(--verde); font-weight: bold; font-size: 1.1em; }
        .pj-gris { color: #7f8c8d; font-weight: bold; font-size: 1em; }
        .badge-amarilla { background: #f1c40f; padding: 3px 8px; border-radius: 3px; font-weight: bold; color: #000; font-size: 0.95em; }
        .badge-sancion { background: var(--rojo); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .badge-ok { background: var(--verde); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }

        /* PARTIDOS */
        .match-row { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.1em; }
        .match-team { width: 42%; font-weight: bold; color: #333; }
        .match-score { background: var(--azul-nav); color: white; padding: 5px 12px; border-radius: 4px; min-width: 60px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .match-score.hora { background: #7f8c8d; font-size: 0.95em; }

        /* DISEÑO EN VIVO */
        .live-card { background: linear-gradient(135deg, #ffffff 0%, #fdf2f2 100%); border-left: 5px solid var(--en-vivo); }
        .live-pulse { display: inline-block; width: 10px; height: 10px; background: var(--en-vivo); border-radius: 50%; margin-right: 8px; animation: pulse 1.5s infinite; vertical-align: middle; }
        .badge-live-score { background: var(--en-vivo); color: white; font-size: 1.5em; padding: 8px 18px; border-radius: 6px; font-weight: bold; min-width: 80px; text-align: center; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .live-time { font-size: 0.9em; color: #e74c3c; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: inline-block; background: rgba(231,76,60,0.1); padding: 4px 10px; border-radius: 4px; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(231, 76, 60, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* PLAYOFFS */
        .bracket-wrapper { display: flex; gap: 30px; padding: 10px 5px; overflow-x: auto; align-items: center; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; height: 550px; min-width: 220px; flex: 1; }
        .bracket-column.final-col { justify-content: center; min-width: 240px; }
        
        .bracket-match { background: white; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; font-size: 0.95em; width: 100%; margin-bottom: 10px; }
        .bracket-title { background: #f4f6f7; font-size: 0.8em; font-weight: bold; text-align: center; color: #666; border-bottom: 1px solid #ddd; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bracket-team-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; }
        .bracket-name { font-weight: bold; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .bracket-goals { background: var(--azul-nav); color: white; font-weight: bold; padding: 4px 10px; border-radius: 3px; min-width: 30px; text-align: center; font-size: 1em; }
        .bracket-goals.empty { background: #e0e0e0; color: #999; }
        
        .winner { background: #ebf5fb; }
        .winner .bracket-name { color: #2980b9; }
        .winner .bracket-goals { background: var(--verde); }

        .hidden { display: none; }

        /* ADAPTACIÓN EXCLUSIVA PARA PANTALLAS MÓVILES */
        @media (max-width: 768px) {
            .menu-toggle { 
                display: block; /* Mostramos el botón de tres rayas en móviles */
            }
            #sidebar { 
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 180px; 
                transform: translateX(-100%); /* Lo escondemos por defecto hacia la izquierda */
            }
            /* Clase que activa JavaScript para mostrar el menú */
            #sidebar.open {
                transform: translateX(0);
            }
            .grid-grupos { grid-template-columns: 1fr; }
            .top-bar { padding: 10px; }
            #content { padding: 10px; }
            .bracket-wrapper { flex-direction: column; align-items: stretch; }
            .bracket-column { height: auto; gap: 15px; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="nav-header">TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ PARTIDOS</div>
        <div id="btn-vivo" class="btn" onclick="ver('vivo')" style="color: #ff8a8a;">📺 EN VIVO</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 GRUPOS</div>
        <div id="btn-elim" class="btn" onclick="ver('elim')">🏆 PLAYOFFS</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 GOLES</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 SANCIONES</div>
    </nav>

    <div id="main-container">
        <div class="top-bar">
            <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>
            <select id="selectorTorneo" class="selector-torneo" onchange="cambiarTorneo(this.value)">
                <option value="masculino">⚽ Fútbol Masculino</option>
                <option value="femenino">🙋‍♀️ Fútbol Femenino</option>
                <option value="ninos">🧒 Fútbol Pequeños</option>
            </select>
        </div>

        <main id="content">
            <div id="partidos"><span class="seccion-titulo">Resultados y Horarios</span><div id="partidos-container"></div></div>
            
            <div id="vivo" class="hidden">
                <span class="seccion-titulo vivo-title"><span class="live-pulse"></span>Partido en Tiempo Real</span>
                <div id="vivo-container"></div>
            </div>

            <div id="grupos" class="hidden"><span class="seccion-titulo">Clasificación</span><div id="grupos-container" class="grid-grupos"></div></div>
            <div id="elim" class="hidden"><span class="seccion-titulo">Fase Final</span><div class="bracket-wrapper" id="bracket-container"></div></div>

            <div id="gol" class="hidden">
                <span class="seccion-titulo">Goleadores</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugador/a</th><th>Club</th><th class="txt-centro">PJ</th><th class="txt-centro">G</th></tr>
                        </thead>
                        <tbody id="body-gol"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="tar" class="hidden">
                <span class="seccion-titulo">Sanciones</span>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Jugador/a</th><th>Club</th><th class="txt-centro">PJ</th><th class="txt-centro">🟨</th><th class="txt-derecha">Estado</th></tr>
                        </thead>
                        <tbody id="body-tar"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Función para abrir y cerrar el menú plegable en móvil
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Cierra el menú automáticamente cuando se pulsa una sección (sólo en móviles)
        function comprobarYCerrarMenu() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        const TORNEOS = {
            masculino: '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg',
            femenino: '1dtRR1tM1BdcnAMAQLjxMC0v_xXL4vPYBazVUo_BCgcQ', 
            ninos: '1mjY3jCUqb-hCau3HZrPWs0Kk2kVVY6xlKg-Dw1a3j-o'
        };

        let torneoActual = localStorage.getItem('torneo_seleccionado') || 'masculino';
        document.getElementById('selectorTorneo').value = torneoActual;
        let SHEET_ID = TORNEOS[torneoActual] || TORNEOS.masculino;

        let partidosJugadosPorClub = {};
        let intervaloCuentaAtras = null;
        let tiempoSegundosRestantes = null;

        function cambiarTorneo(nuevoTorneo) {
            localStorage.setItem('torneo_seleccionado', nuevoTorneo);
            location.reload();
        }

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function extraerValorCelda(celda) {
            if (!celda) return '';
            if (celda.v !== null && celda.v !== undefined && typeof celda.v === 'string' && celda.v.includes('Date(')) {
                const partes = celda.v.match(/\d+/g);
                if (partes && partes.length >= 5) {
                    return `${partes[3].padStart(2, '0')}:${partes[4].padStart(2, '0')}`;
                }
            }
            if (celda.f !== null && celda.f !== undefined) return celda.f.trim();
            if (celda.v !== null && celda.v !== undefined) return celda.v.toString().trim();
            return '';
        }

        async function consultarGoogleSheet(nombrePestaña) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombrePestaña)}`;
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const jsonNeto = JSON.parse(texto.slice(inicioJson, finJson));
                
                if (!jsonNeto || !jsonNeto.table || !jsonNeto.table.rows) return { rows: [] };
                return { rows: jsonNeto.table.rows.map(r => r.c ? r.c.map(celda => extraerValorCelda(celda)) : []) };
            } catch (error) {
                console.error("Error cargando: " + nombrePestaña, error);
                return null;
            }
        }

        async function cargarTodo() {
            try {
                const resP = await consultarGoogleSheet('Partidos');
                const resC = await consultarGoogleSheet('Clasificacion');
                const resG = await consultarGoogleSheet('Goleadores');
                const resS = await consultarGoogleSheet('Tarjetas'); 
                const resE = await consultarGoogleSheet('Eliminatorias');
                const resV = await consultarGoogleSheet('EnVivo');

                if (!resP || resP.rows.length === 0) {
                    document.getElementById('partidos-container').innerHTML = `<div style="color:#e74c3c; text-align:center; padding:20px; font-weight:bold;">⚠️ Error de sincronización.</div>`;
                    return;
                }

                renderPartidos(resP.rows);
                if (resC) renderClasificacion(resC);
                if (resG) renderGoleadores(resG);
                if (resS) renderTarjetasReal(resS);
                if (resE) renderBracket(resE);
                if (resV) renderEnVivo(resV);
            } catch (e) { console.error(e); }
        }

        setInterval(async () => {
            try {
                const resV = await consultarGoogleSheet('EnVivo');
                const resP = await consultarGoogleSheet('Partidos');
                if (resP) renderPartidos(resP.rows);
                if (resV) actualizarMarcadorYComprobarExcel(resV);
            } catch(e){}
        }, 5000);

        function renderPartidos(rows) {
            const container = document.getElementById('partidos-container');
            if (!container) return;
            partidosJugadosPorClub = {};
            const partidosValidos = rows.filter((fila, idx) => idx > 0 && fila && fila[1] && normalizarTexto(fila[1]) !== 'local');
            
            container.innerHTML = partidosValidos.map(fila => {
                const hora = fila[0] || ''; const local = fila[1] || ''; const visitante = fila[2] || '';
                const gL = parseInt(fila[3]), gV = parseInt(fila[4]);
                let marcadorHTML = '';
                if (!isNaN(gL) && !isNaN(gV)) {
                    marcadorHTML = `<div class="match-score">${gL}:${gV}</div>`;
                    partidosJugadosPorClub[normalizarTexto(local)] = (partidosJugadosPorClub[normalizarTexto(local)] || 0) + 1;
                    partidosJugadosPorClub[normalizarTexto(visitante)] = (partidosJugadosPorClub[normalizarTexto(visitante)] || 0) + 1;
                } else {
                    marcadorHTML = `<div class="match-score hora">${hora || '-:-'}</div>`;
                }
                return `<div class="card"><div class="match-row"><div class="match-team" style="text-align:right;">${local}</div>${marcadorHTML}<div class="match-team">${visitante}</div></div></div>`;
            }).join('');
        }

        function renderEnVivo(res) {
            const container = document.getElementById('vivo-container');
            if (!container) return;
            const filaVivo = res.rows.find((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');

            if (!filaVivo) {
                if (intervaloCuentaAtras) { clearInterval(intervaloCuentaAtras); intervaloCuentaAtras = null; }
                tiempoSegundosRestantes = null;
                container.innerHTML = `<div style="color:white;text-align:center;padding:40px;font-size:1.1em;">⏸️ No hay ningún partido en vivo.</div>`;
                return;
            }

            const local = filaVivo[0] || '—'; const marcador = filaVivo[1] || '0:0'; const visitante = filaVivo[2] || '—';
            const textoTiempoExcel = filaVivo[3] || '';

            container.innerHTML = `
                <div class="card live-card">
                    <div style="padding: 12px 20px; background: rgba(231, 76, 60, 0.05); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(231,76,60,0.1);">
                        <span id="cronometro-live" class="live-time">⏱️ 20:00</span>
                    </div>
                    <div class="match-row" style="padding: 30px 20px;">
                        <div class="match-team" style="text-align:right; font-size:1.25em;" id="live-local">${local}</div>
                        <div class="badge-live-score" id="live-marcador">${marcador}</div>
                        <div class="match-team" style="font-size:1.25em;" id="live-visitante">${visitante}</div>
                    </div>
                </div>`;

            if (textoTiempoExcel.includes(':') && tiempoSegundosRestantes === null) {
                const partes = textoTiempoExcel.split(':');
                tiempoSegundosRestantes = (parseInt(partes[0]) * 60) + parseInt(partes[1]);
                if (intervaloCuentaAtras) clearInterval(intervaloCuentaAtras);
                
                intervaloCuentaAtras = setInterval(() => {
                    if (tiempoSegundosRestantes <= 0) {
                        document.getElementById('cronometro-live').innerText = "⏹️ FIN DEL PARTIDO";
                        document.getElementById('cronometro-live').style.background = "#7f8c8d";
                        document.getElementById('cronometro-live').style.color = "white";
                        clearInterval(intervaloCuentaAtras); intervaloCuentaAtras = null;
                    } else {
                        tiempoSegundosRestantes--;
                        document.getElementById('cronometro-live').innerText = `⏱️ Quedan: ${Math.floor(tiempoSegundosRestantes / 60)}:${(tiempoSegundosRestantes % 60).toString().padStart(2, '0')}`;
                    }
                }, 1000);
            } else if (!textoTiempoExcel) {
                document.getElementById('cronometro-live').innerText = "⏸️ EN ESPERA";
                if (intervaloCuentaAtras) { clearInterval(intervaloCuentaAtras); intervaloCuentaAtras = null; }
                tiempoSegundosRestantes = null;
            }
        }

        function actualizarMarcadorYComprobarExcel(res) {
            const filaVivo = res.rows.find((fila, idx) => idx > 0 && fila && fila[0] && fila[0].toString().trim() !== '');
            if (!filaVivo) { renderEnVivo(res); return; }
            if(document.getElementById('live-local')) document.getElementById('live-local').innerText = filaVivo[0] || '—';
            if(document.getElementById('live-marcador')) document.getElementById('live-marcador').innerText = filaVivo[1] || '0:0';
            if(document.getElementById('live-visitante')) document.getElementById('live-visitante').innerText = filaVivo[2] || '—';
            if (!(filaVivo[3] || '') && tiempoSegundosRestantes !== null) renderEnVivo(res);
        }

        function renderClasificacion(res) {
            const container = document.getElementById('grid-grupos'); if (!container) return;
            const equiposValidos = res.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && normalizarTexto(fila[0]) !== 'equipo');
            const grupos = {};
            equiposValidos.forEach(fila => {
                const grupo = fila[1] || 'Único';
                if (!grupos[grupo]) grupos[grupo] = [];
                grupos[grupo].push({ nombre: fila[0].trim(), pts: parseInt(fila[3])||0, dif: fila[2]||'0', pj: partidosJugadosPorClub[normalizarTexto(fila[0])]||0 });
            });
            container.innerHTML = Object.keys(grupos).map(g => {
                const orden = grupos[g].sort((a,b) => b.pts - a.pts);
                return `<div class="card"><div style="padding:10px 15px; background:#f0f0f0; font-weight:bold; font-size:0.8em; color:#666;">GRUPO ${g}</div><table><thead><tr><th>EQUIPO</th><th class="txt-centro">PJ</th><th class="txt-centro">DIF</th><th class="txt-centro">PTS</th></tr></thead><tbody>${orden.map(e => `<tr><td><b>${e.nombre}</b></td><td class="txt-centro pj-gris">${e.pj}</td><td class="txt-centro">${e.dif}</td><td class="txt-centro pts-verde">${e.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }

        function renderGoleadores(res) {
            const container = document.getElementById("body-gol"); if (!container) return;
            const jugadoresValidos = res.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && normalizarTexto(fila[0]) !== 'jugador');
            container.innerHTML = jugadoresValidos.sort((a,b) => (parseInt(b[3])||0)-(parseInt(a[3])||0)).map(fila => `<tr><td><b>${fila[0].trim()}</b></td><td class="txt-club">${fila[1]||'-'}</td><td class="txt-centro pj-gris">${partidosJugadosPorClub[normalizarTexto(fila[1])]||0}</td><td class="txt-centro pts-verde">${fila[3]||'0'}</td></tr>`).join('');
        }

        function renderTarjetasReal(res) {
            const container = document.getElementById("body-tar"); if (!container) return;
            const filasTarjetas = res.rows.filter((fila, idx) => idx > 0 && fila && fila[0] && normalizarTexto(fila[0]) !== 'nombre');
            container.innerHTML = filasTarjetas.map(fila => {
                let s = fila[3] ? fila[3].toString().trim() : '';
                let estado = (s==='1'||normalizarTexto(s)==='sancionado'||normalizarTexto(s)==='si') ? `<span class="badge-sancion">SANCIONADO</span>` : `<span class="badge-ok">OK</span>`;
                return `<tr><td><b>${fila[0]}</b></td><td class="txt-club">${fila[1]||'-'}</td><td class="txt-centro pj-gris">${partidosJugadosPorClub[normalizarTexto(fila[1])]||0}</td><td class="txt-centro"><span class="badge-amarilla">${fila[2]||'0'}</span></td><td class="txt-derecha">${estado}</td></tr>`;
            }).join('');
        }

        function transformarPartidoBracket(filaFase, titulo) {
            if (!filaFase) return `<div class="bracket-match"><div class="bracket-title">${titulo}</div><div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div><div class="bracket-team-row"><span class="bracket-name">—</span><span class="bracket-goals empty">-</span></div></div>`;
            const local = filaFase[1], visitante = filaFase[4], gL = parseInt(filaFase[2]), gV = parseInt(filaFase[3]);
            return `<div class="bracket-match"><div class="bracket-title">${titulo}</div><div class="bracket-team-row ${gL>gV?'winner':''}"><span class="bracket-name">${local||'—'}</span><span class="bracket-goals ${isNaN(gL)?'empty':''}">${isNaN(gL)?'-':gL}</span></div><div class="bracket-team-row ${gV>gL?'winner':''}"><span class="bracket-name">${visitante||'—'}</span><span class="bracket-goals ${isNaN(gV)?'empty':''}">${isNaN(gV)?'-':gV}</span></div></div>`;
        }

        function renderBracket(res) {
            const container = document.getElementById('bracket-container'); if (!container) return;
            const fasesValidas = res.rows.filter((fila, idx) => idx === 0 && fila && fila[0] && normalizarTexto(fila[0]) !== 'fase');
            const buscarFase = (nombre) => fasesValidas.find(f => normalizarTexto(f[0]) === normalizarTexto(nombre));
            container.innerHTML = `<div class="bracket-column">${transformarPartidoBracket(buscarFase('Cuartos 1'), 'Cuartos 1')}${transformarPartidoBracket(buscarFase('Cuartos 2'), 'Cuartos 2')}${transformarPartidoBracket(buscarFase('Cuartos 3'), 'Cuartos 3')}${transformarPartidoBracket(buscarFase('Cuartos 4'), 'Cuartos 4')}</div><div class="bracket-column">${transformarPartidoBracket(buscarFase('Semifinal 1'), 'Semifinal 1')}${transformarPartidoBracket(buscarFase('Semifinal 2'), 'Semifinal 2')}</div><div class="bracket-column final-col">${transformarPartidoBracket(buscarFase('Final'), '🏆 GRAN FINAL')}</div>`;
        }

        function ver(s) {
            ['partidos', 'vivo', 'grupos', 'elim', 'gol', 'tar'].forEach(id => {
                const elem = document.getElementById(id); const btn = document.getElementById('btn-' + id);
                if (elem) elem.classList.toggle('hidden', id !== s); if (btn) btn.classList.toggle('active', id === s);
            });
            comprobarYCerrarMenu(); // Cierra el menú al hacer clic en un enlace en el móvil
        }
        window.onload = cargarTodo;
    </script>
</body>
</html>

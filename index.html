<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo La Yesa - Sistema Automático</title>
    <style>
        :root { --azul-oscuro: #1b3a4b; --azul-menu: #142d3b; --verde: #229954; --blanco: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--azul-oscuro); color: #333; }
        
        /* Navegación lateral */
        #nav { width: 220px; background: var(--azul-menu); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-header { padding: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bdc3c7; transition: 0.3s; }
        .btn.active { background: var(--verde); color: white; font-weight: bold; }
        
        /* Contenido */
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .seccion-titulo { color: white; font-size: 1.5em; margin-bottom: 20px; border-bottom: 3px solid var(--verde); display: inline-block; padding-bottom: 5px; }
        .card { background: var(--blanco); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        td, th { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #666; font-size: 0.8em; text-transform: uppercase; }
        
        /* Etiquetas */
        .amarilla-box { background: #f1c40f; color: #333; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .status-sancion { color: var(--rojo); font-weight: bold; font-size: 0.85em; }
        .status-ok { color: var(--verde); font-weight: bold; font-size: 0.85em; }
        .hidden { display: none; }
        .grid-clasificacion { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="nav-header">🏆 TORNEO LA YESA</div>
        <div id="btn-partidos" class="btn active" onclick="ver('partidos')">⚽ Partidos</div>
        <div id="btn-grupos" class="btn" onclick="ver('grupos')">📊 Clasificación</div>
        <div id="btn-gol" class="btn" onclick="ver('gol')">👟 Goleadores</div>
        <div id="btn-tar" class="btn" onclick="ver('tar')">🟨 Tarjetas</div>
    </nav>

    <main id="content">
        <div id="grupos" class="hidden">
            <div class="seccion-titulo">Clasificación</div>
            <div id="grupos-container" class="grid-clasificacion"></div>
        </div>

        <div id="tar" class="hidden">
            <div class="seccion-titulo">Sanciones</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th style="text-align:center">🟨</th><th style="text-align:center">PJ</th><th>Estado</th></tr></thead>
                    <tbody id="body-tar"></tbody>
                </table>
            </div>
        </div>

        <div id="gol" class="hidden">
            <div class="seccion-titulo">Goleadores</div>
            <div class="card">
                <table>
                    <thead><tr><th>Jugador</th><th>Equipo</th><th style="text-align:center">PJ</th><th style="text-align:center">Goles</th></tr></thead>
                    <tbody id="body-gol"></tbody>
                </table>
            </div>
        </div>

        <div id="partidos">
            <div class="seccion-titulo">Resultados</div>
            <div id="partidos-container"></div>
        </div>
    </main>

    <script>
        const SHEET_ID = '11JNeF_bSmgVw-UjmW2QIgzKK9EVLufY6hIGIVx2HLvg';

        async function cargarTodo() {
            try {
                const [resP, resC, resG, resT] = await Promise.all([
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Partidos`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Clasificacion`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Goleadores`).then(r => r.json()),
                    fetch(`https://opensheet.elk.sh/${SHEET_ID}/Tarjetas`).then(r => r.json())
                ]);

                // 1. Calcular PJ por equipo (Partidos con Goles anotados)
                const equipoStats = {};
                resP.forEach(p => {
                    if (p.Local && p.GolesL !== "" && p.GolesL !== undefined) {
                        equipoStats[p.Local] = (equipoStats[p.Local] || 0) + 1;
                        equipoStats[p.Visitante] = (equipoStats[p.Visitante] || 0) + 1;
                    }
                });

                renderClasificacion(resC, equipoStats);
                renderGoleadores(resG, equipoStats);
                renderTarjetas(resT, equipoStats, resG);
                renderPartidos(resP);
            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function renderClasificacion(data, stats) {
            const container = document.getElementById('grupos-container');
            const grupos = {};
            data.filter(e => e.Nombre).forEach(e => {
                if (!grupos[e.Grupo]) grupos[e.Grupo] = [];
                grupos[e.Grupo].push(e);
            });
            container.innerHTML = Object.keys(grupos).map(g => `
                <div class="card">
                    <div style="padding:10px 15px; background:#f8f9fa; font-weight:bold;">GRUPO ${g}</div>
                    <table>
                        <thead><tr><th>Equipo</th><th style="text-align:center">PJ</th><th style="text-align:center">PTS</th></tr></thead>
                        <tbody>${grupos[g].map(e => `<tr><td>${e.Nombre}</td><td style="text-align:center">${stats[e.Nombre] || 0}</td><td style="text-align:center; font-weight:bold; color:var(--verde)">${e.Puntos || 0}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`).join('');
        }

        function renderTarjetas(tarjetasData, equipoStats, goleadoresData) {
            // Mapa para saber cuántos partidos lleva el jugador en realidad (desde Goleadores)
            const pjJugadorMapa = {};
            goleadoresData.forEach(g => { if(g.Nombre) pjJugadorMapa[g.Nombre] = parseInt(g.Partidos) || 0; });

            document.getElementById("body-tar").innerHTML = tarjetasData.filter(j => j.Nombre).map(j => {
                const amarillas = parseInt(j.Amarillas) || 0;
                const pjEquipo = equipoStats[j.Equipo] || 0;
                const pjRealJugador = pjJugadorMapa[j.Nombre] || 0;
                
                let estado = `<span class="status-ok">✅ DISPONIBLE</span>`;
                let pjAMostrar = pjEquipo;

                // Lógica automática de sanción
                if (amarillas > 0 && amarillas % 3 === 0) {
                    // Si el equipo no ha avanzado más partidos que el jugador, sigue sancionado
                    if (pjEquipo <= pjRealJugador) {
                        estado = `<span class="status-sancion">⚠️ SANCIONADO</span>`;
                        pjAMostrar = pjEquipo - 1;
                    } else {
                        // El equipo ya jugó el partido de castigo, el jugador ya cumplió
                        estado = `<span class="status-ok">✅ DISPONIBLE</span>`;
                        pjAMostrar = pjRealJugador;
                    }
                }

                return `
                    <tr>
                        <td><b>${j.Nombre}</b><br><small>${j.Equipo}</small></td>
                        <td style="text-align:center"><span class="amarilla-box">${amarillas}</span></td>
                        <td style="text-align:center; font-weight:bold">${pjAMostrar < 0 ? 0 : pjAMostrar}</td>
                        <td>${estado}</td>
                    </tr>`;
            }).join('');
        }

        function renderGoleadores(data, stats) {
            document.getElementById("body-gol").innerHTML = data.filter(j => j.Nombre).map(j => `
                <tr>
                    <td><b>${j.Nombre}</b></td>
                    <td>${j.Equipo}</td>
                    <td style="text-align:center">${stats[j.Equipo] || 0}</td>
                    <td style="text-align:center; font-weight:bold; color:var(--verde)">${j.Goles || 0}</td>
                </tr>`).join('');
        }

        function renderPartidos(data) {
            document.getElementById('partidos-container').innerHTML = data.filter(m => m.Local).map(m => `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1; text-align:right; font-weight:bold;">${m.Local}</div>
                    <div style="background:var(--azul-oscuro); color:white; padding:5px 15px; border-radius:6px; margin:0 15px; font-weight:bold;">
                        ${m.GolesL !== "" ? m.GolesL : '-'} : ${m.GolesV !== "" ? m.GolesV : '-'}
                    </div>
                    <div style="flex:1; text-align:left; font-weight:bold;">${m.Visitante}</div>
                </div>`).join('');
        }

        function ver(s) {
            ['partidos', 'grupos', 'gol', 'tar'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== s);
                document.getElementById('btn-' + id).classList.toggle('active', id === s);
            });
        }

        cargarTodo();
    </script>
</body>
</html>
